  `}var Ka=({state:t})=>({title:"Uw geboortedatum",currentValue:`Uw huidige stand: ${t.deelnemer.x0} jaar`,sections:[{heading:"WAT VULT U IN?",body:"Vul uw geboortedatum in. Uw leeftijd wordt hieruit afgeleid en gebruikt in de berekening."}]}),Ha=({state:t})=>({title:"Uw pensioen",currentValue:`Uw huidige stand: \u20AC ${Math.round(t.deelnemer.pen).toLocaleString("nl-NL")} per jaar`,sections:[{heading:"WAAR VINDT U DIT OP UW UPO?",body:'Bij SSPF onder de vraag "Hoeveel pensioen krijgt u?". Daar staat: "U krijgt vanaf [datum] zolang u leeft \u20AC \u2026 bruto per jaar". Dat bedrag vult u hier in.'}]}),Za=({state:t})=>({title:"Geboortedatum partner",currentValue:`Uw huidige stand: ${t.deelnemer.x_partner??0} jaar`,sections:[{heading:"WAT VULT U IN?",body:"Vul de geboortedatum van uw partner in. De leeftijd van uw partner wordt hieruit afgeleid."}]}),Ga=({state:t})=>({title:"Partnerpensioen na uw overlijden",currentValue:`Uw huidige stand: \u20AC ${Math.round(t.deelnemer.y0??0).toLocaleString("nl-NL")} per jaar`,sections:[{heading:"WAAR VINDT U DIT OP UW UPO?",body:'Bij SSPF onder de vraag "Wat krijgen uw eventuele partner en eventuele kinderen als u overlijdt?". Daar staat: "Als u overlijdt, krijgt uw partner van ons: vanaf uw overlijden zolang hij/zij leeft \u20AC \u2026 bruto per jaar". Dat bedrag vult u hier in.'}]}),Fn={x0:Ka,pen:Ha,x_partner:Za,y0:Ga};var Ua=({state:t,pct:e})=>({title:"Rekenrente",currentValue:`Uw huidige stand: ${e(t.parameters_m1.r)}`,sections:[{heading:"WAT DOET DE REKENRENTE?",body:"De rekenrente bepaalt hoe toekomstige pensioenuitkeringen worden teruggerekend naar een waarde van vandaag. Bij een hogere rekenrente wordt de huidige waarde van uw aanspraak lager: \xE9\xE9n euro pensioen volgend jaar wordt dan met een grotere korting teruggerekend. Bij een lagere rekenrente is uw aanspraak vandaag meer waard."},{heading:"WAT KUNT U INSTELLEN?",body:"Verschuif de slider om een rekenrente te kiezen tussen 0% en 5%."}]}),Wa=({state:t,pct:e})=>({title:"Dekkingsgraad",currentValue:`Uw huidige stand: ${e(t.parameters_m2.dekkingsgraad,1)}`,sections:[{heading:"WAT KUNT U INSTELLEN?",body:"Verschuif de slider om een dekkingsgraad te kiezen tussen 100% en 170%."}]}),qa=()=>({title:"Aftrek voor reserveringen",sections:[{heading:"VERVANGEN DOOR M1/2-PANE",body:'De aftrek-componenten staan nu zichtbaar in de cascade-tabel "Wat is er te verdelen?". Schuif daar de drie componenten (wettelijke reserves, risicodelingsreserve, compensatiedepot) om hun effect op uw persoonlijk pensioenvermogen te zien.'}]}),Ja=({state:t})=>({title:"Spreidingstermijn",currentValue:`Uw huidige stand: ${t.parameters_m2.spreidingN>=1e3?"oneindig":t.parameters_m2.spreidingN+" jaar"}`,sections:[{heading:"WAT DOET DE SPREIDINGSTERMIJN?",body:"De spreidingstermijn bepaalt hoe het verdeelbare overschot bij invaren over de deelnemers wordt verdeeld. De wettelijke standaard (Bijlage 2a Regeling Pensioenwet) is 10 jaar: het overschot wordt uitgesmeerd over de komende tien jaar, waardoor jongere deelnemers naar verhouding meer ontvangen dan oudere; zij hebben immers een langere verwachte uitkeringshorizon waarop het overschot kan landen. Bij levenslang krijgen alle deelnemers het overschot proportioneel naar hun aanspraak, zonder extra cohort-opslag. Voor pensioengerechtigden valt het persoonlijk pensioenvermogen onder levenslang doorgaans lager uit dan onder de 10-jaars standaard; voor jongere cohorten geldt het omgekeerde."},{heading:"WAT KUNT U INSTELLEN?",body:"Kies tussen 10 jaar of levenslang."}]}),Kn={r:Ua,dekkingsgraad:Wa,vpvAftrekPct:qa,spreidingN:Ja};var Ya=({state:t})=>({title:"Transitiebijdrage werkgever",currentValue:`Uw huidige stand: \u20AC ${t.parameters_m2.bijstort.toLocaleString("nl-NL")} mln`,sections:[{heading:"WAT IS DIT?",body:"De transitiebijdrage is een eenmalige storting van de werkgever bij invaren, als compensatie voor het vervallen van de sponsorgarantie. Dit bedrag verhoogt het fondsvermogen v\xF3\xF3r de aftrek voor reserves en compensatie, en werkt daarmee door in het verdeelbaar overschot."},{heading:"HOE HOOG IS HET BEDRAG?",body:"Volgens het SSPF-implementatieplan van 15-07-2025 hangt het bedrag af van de dekkingsgraad op het invaarmoment: bij DG \u2265 135% \u20AC 500 mln, bij DG 130\u2013135% \u20AC 650 mln, bij DG 125\u2013130% \u20AC 850 mln. Hoe lager de dekkingsgraad, hoe hoger de transitiebijdrage \u2014 de werkgever vult meer aan als het fonds er minder ruim voor staat."},{heading:"LET OP",body:"Deze calculator past het bedrag niet automatisch aan wanneer u de dekkingsgraad-slider verschuift. De standaardwaarde \u20AC 500 mln hoort bij de huidige SSPF-DG (\u2265 135%). Schuif desgewenst de transitiebijdrage-slider handmatig naar het bedrag dat bij de door u gekozen DG hoort."}]}),Xa=()=>({title:"Per jaar pensioen levenslang",sections:[{heading:"WAT BETEKENT DIT BEDRAG?",body:"Het bedrag is een rekenwiskunde-omrekening: uw aandeel verdeelbaar overschot, vertaald naar een jaarlijkse uitkering op basis van uw verwachte levensduur (volgens AG2024-sterftekansen) en de huidige rekenrente. Het is een wiskundig equivalent, geen toezegging."},{heading:"EN ALS U EEN PARTNER HEEFT?",body:"Het persoonlijk pensioenvermogen wordt na uw overlijden gebruikt om partnerpensioen te financieren. Bij de omrekening wordt die verplichting meegenomen: hetzelfde vermogen moet zowel uw OP-uitkering dragen zolang u leeft, als het PP-uitkering aan uw partner n\xE1 uw overlijden. Daardoor ligt het jaarbedrag lager dan zonder partner \u2014 dit is geen verlies maar de reservering voor uw partner."},{heading:"WAT GEBEURT ER MET HET PARTNERPENSIOEN BIJ INVAREN?",body:"Bij invaren wordt het persoonlijk pensioenvermogen via de standaardregel (Bijlage 2a Regeling Pensioenwet) verhoogd of verlaagd ten opzichte van uw huidige aanspraak. SSPF kiest in zijn implementatieplan voor een levenslange spreiding van het verdeelbare overschot. Het gevolg: een verhoging van het persoonlijk vermogen werkt proportioneel door op zowel uw ouderdomspensioen als het partnerpensioen voor uw partner n\xE1 uw overlijden. Bij bijvoorbeeld een verhoging van 30% groeit zowel uw OP-uitkering als de aanspraak op partnerpensioen voor uw partner met circa 30%. Onder de wettelijke standaardspreiding van 10 jaar zou deze proportionaliteit niet exact gelden; de keuze van SSPF voor levenslange spreiding is dus bepalend."},{heading:'WAT BETEKENT "LEVENSLANG"?',body:"Levenslang is geen vaste sterfdatum, maar een statistische verwachting. Als u langer leeft dan gemiddeld, krijgt u dit bedrag toch elk jaar \u2014 dat wordt collectief gefinancierd door deelnemers die korter leven. Als u eerder overlijdt, stopt de uitkering bij overlijden (tenzij er een partner-pensioen is)."},{heading:"GEEN RECHTEN TE ONTLENEN",body:"De daadwerkelijke jaarlijkse uitkering in het nieuwe pensioenstelsel hangt af van fonds-rendementen, rentestand, indexatie en fondsbeleidsbeslissingen. Aan dit bedrag kunnen geen rechten worden ontleend."}]}),Qa=()=>({title:"Hoog-laag-uitkering",sections:[{heading:"WAT VULT U IN?",body:'Bij "Pensioen tot knip" vult u het hoge bedrag in dat u nu nog ontvangt. Bij "Pensioen na knip" het bedrag dat u na de overstap krijgt. Bij "Datum waarop pensioen wijzigt" de datum die op uw UPO staat. Als die datum al voorbij is, zet de toggle uit en vul alleen het lage bedrag in als pensioen.'}]}),Hn={bijstort:Ya,jaarequivalent:Xa,hooglaag:Qa};var ei=()=>({title:"Privacy",sections:[{heading:"GEEN INVOER VERLAAT UW BROWSER",body:"Deze tool werkt volledig lokaal in uw browser. Uw invoer (leeftijd, jaarpensioen, partnergegevens, en alle andere parameters die u aanpast) wordt niet verstuurd naar een server, niet opgeslagen, niet gedeeld met derden, en niet gebruikt voor analyse of profilering. De berekeningen vinden plaats in JavaScript-code die met de webpagina is meegestuurd; sluiten van het tabblad of de browser wist alle gegevens."},{heading:"GEEN COOKIES, GEEN TRACKING",body:"De tool plaatst geen cookies, gebruikt geen webanalyse, en bevat geen externe tracking-scripts."},{heading:"HOSTING VIA GITHUB PAGES",body:"Deze tool wordt gehost via GitHub Pages (een dienst van GitHub, Inc., onderdeel van Microsoft). Bij het ophalen van de pagina door uw browser legt GitHub standaard HTTP-server-gegevens vast \u2014 IP-adres, gebruikte browser, tijdstip van bezoek, opgevraagde bestanden \u2014 voor beveiligings- en infrastructuurdoeleinden. Dit gebeurt buiten invloed van de auteur. Voor het privacy-beleid van GitHub: https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement."},{heading:"VOOR DE INHOUDELIJKE VERANTWOORDING",body:'Deze pagina beschrijft alleen wat met uw invoer gebeurt. Voor de inhoudelijke verantwoording van de tool \u2014 wat hij wel en niet kan, hoe hij tot stand is gekomen, op welke aannames hij berust, welke bronnen zijn gebruikt, en wat de bekende afwijkingen zijn ten opzichte van de werkelijke SSPF-uitkomst \u2014 zie de knop "Verantwoording" rechtsboven op het hoofdscherm.'}],footerLink:{key:"verantwoording",label:"Open Verantwoording"}}),ti=()=>({title:"Uitleg",sections:[{heading:"",body:"De Wet toekomst pensioenen (Wtp) hervormt het Nederlandse pensioenstelsel. Uw huidige pensioenrecht wordt omgezet naar een persoonlijk pensioenvermogen op uw naam, dat na invaren meebeweegt met de beleggingsresultaten van uw fonds."},{heading:"VOOR WIE IS DEZE REKENTOOL?",body:`Voor wie ${Y.shortLabel??""}-pensioen ontvangt na de AOW-leeftijd. Wie nog werkt, vervroegd pensioen tot de AOW heeft, of een aanspraak heeft die nog niet uitkeert, valt buiten deze berekening.`},{heading:"WAT BEREKENT DEZE REKENTOOL?",body:"De rekentool laat zien wat invaren voor u zou betekenen op het invaarmoment zelf. U ziet twee bedragen: uw huidige pensioenaanspraak (de waarde vandaag van uw lopende pensioen) en uw persoonlijk pensioenvermogen na invaren (wat hiervan aan u zou worden toebedeeld volgens de wettelijke standaardregel). Hoe uw jaarlijkse uitkering zich na invaren ontwikkelt, zit nog niet in deze versie."},{heading:"WAT KUNT U HIER DOEN?",body:"U vult uw gegevens uit het Uniform Pensioenoverzicht (UPO) in: leeftijd, geslacht, bruto jaarpensioen en eventueel partnergegevens. Heeft u nu een hoog-laag-uitkering \u2014 een tijdelijk hoger pensioen tot een afgesproken knip-datum, daarna een lager bedrag levenslang \u2014 vul dan ook het lage bedrag en de knip-datum in. De fondsparameters staan al op de actuele waarden, dus na invoer van uw UPO-gegevens bent u meteen klaar. Wilt u onderzoeken hoe gevoelig uw uitkomst is voor verschillende aannames, dan verschuift u de fondsparameters via de sliders om bijvoorbeeld een andere dekkingsgraad te beproeven. Een Reset-knop verschijnt zodra u afwijkt van de fonds-uitgangswaarden."}]}),ni=({releaseVersion:t})=>({title:`Verantwoording bij de Invaarcalculator (versie ${t})`,sections:[{heading:"1. WAT IS DEZE TOOL EN WAT IS HET NIET?",body:"Deze Invaarcalculator is een onafhankelijk, niet door Stichting Shell Pensioenfonds (SSPF) erkend of gevalideerd reken-instrument dat poogt de orde van grootte zichtbaar te maken van de invaareffecten voor een SSPF-deelnemer onder de Wet toekomst pensioenen (Wtp). De tool implementeert de wettelijke standaardregel (Bijlage 2a Regeling Pensioenwet) op basis van uitsluitend publiek beschikbare bronnen en redelijke aannames waar publieke informatie ontbreekt. De uitkomsten zijn per definitie niet identiek aan wat SSPF voor u individueel berekent. SSPF beschikt over niet-publieke gegevens (uw werkelijke aanspraak in de pensioenadministratie, fondsspecifieke uitvoeringskeuzes uit de actuari\xEBle en bedrijfstechnische nota (ABTN), de definitieve dekkingsgraad op invaardatum, de exacte populatiesamenstelling, eventuele afwijkingen van de standaardregel die in het transitieplan zijn vastgelegd) waar deze tool geen toegang toe heeft. Aan de uitkomsten kunnen geen rechten worden ontleend. Voor uw werkelijke invaarpositie zijn alleen de transitiebrief en de definitieve berekening van SSPF zelf maatgevend."},{heading:"2. DOOR WIE EN WAAROM IS DEZE TOOL GEMAAKT?",body:"Deze tool is ontwikkeld door drs. ing. H. Haringa (Innovation Nestor) als publiek en onafhankelijk studieproject. De aanleiding ligt in de SSPF-transitie naar de Wtp en de constatering dat fondsleden \u2014 gepensioneerden, actieven en slapers \u2014 geen instrument tot hun beschikking hebben om de fondscommunicatie zelfstandig te toetsen."},{heading:"DE AANLEIDING",body:'Op 14 april 2026 stemde de Algemene Ledenvergadering (ALV) van Voeks (vereniging van Shell-gepensioneerden) over een ledenmotie "Toetsbare onderbouwing van een aantoonbaar toereikende en evenwichtige transitiebijdrage als compensatie voor het vervallen van de sponsorgarantie". De motie werd verworpen (41 voor, 64 tegen). De inhoudelijke kern bleef daarmee onbeantwoord: een kwantitatieve onderbouwing van de hoogte van de aangeboden transitiebijdrage \u2014 bezien tegen de waarde van de vervallende sponsorgarantie \u2014 is publiek niet beschikbaar. Fondsleden worden geacht een ingrijpend en onomkeerbaar besluit te accepteren zonder zelf over een toetsmiddel te beschikken.'},{heading:"EEN BREDERE OBSERVATIE",body:'Bijna geen enkel Nederlands pensioenfonds biedt zijn deelnemers op het moment van invaren een "digital twin" \u2014 een interactief reken-instrument waarmee deelnemers de invaareffecten op hun eigen situatie kunnen verkennen. De rekenmethodiek uit Bijlage 2a Regeling Pensioenwet is publiek beschreven; de individuele uitwerking blijft voor de deelnemer een zwarte doos waarvan alleen de eindstand zichtbaar wordt \u2014 en pas n\xE1 de transitie definitief. Dat dwingt deelnemers in een passieve positie: vertrouwen op het fonds, of accepteren zonder verificatie. Voor een transitie van deze omvang \u2014 waarbij het renterisico, beleggingsrisico en levensduurrisico goeddeels van fonds naar deelnemer verschuift \u2014 is dat een onbevredigende situatie. Deze tool is een eerste poging die leemte voor SSPF-deelnemers te dichten.'},{heading:"WAARTOE DE TOOL DIENT \u2014 TYPE VRAGEN DIE ERMEE ONDERBOUWD KUNNEN WORDEN",body:'De auteur heeft de tool zelf gebruikt als rekenkundige onderbouwing voor drie documenten gericht aan SSPF respectievelijk De Nederlandsche Bank (DNB). Het eerste is een zienswijze aan DNB van 1 september 2025 over het wegvallen van de Shell-sponsorgarantie en de ontoereikendheid van de Shell-bijdrage als afkoop daarvan. Het tweede is een vragenbrief aan SSPF van 2 mei 2026 met vijf kwantitatieve vragen over de keuze voor een levenslange spreidingsperiode in plaats van de wettelijke standaard van tien jaar (hoofdstuk 5.6 van het implementatieplan). Die vragenbrief verzoekt om vergelijkende doorrekening van transitiemaatstaven, kwantificering van de buffer-toedeling per cohort, het effect op de Shell-bijdrage onder beide spreidingsregimes, uitsplitsing naar deelnemersgroepen, en de vraag of de risicodelingsreserve (RDR) feitelijk fungeert als compensatie voor het lagere bufferaandeel. Het derde document is een aanvullende zienswijze aan DNB van 2 mei 2026 met drie verzoeken: om de wettelijke tweeledige onderbouwingsplicht voor afwijking van de standaard spreidingstermijn te toetsen, om het ontbreken van een vergelijkende kwantitatieve onderbouwing te betrekken bij de invaartoetsing, en om de evenwichtige belangenafweging voor de spreidingstermijnkeuze zelfstandig te toetsen. Deze documenten zijn opvraagbaar via het e-mailadres in de footer van deze tool. Zij illustreren welk soort vragen met deze calculator inhoudelijk kan worden voorbereid: niet "wat wordt mijn precieze uitkering" \u2014 dat blijft voorbehouden aan SSPF \u2014 maar "is de orde van grootte plausibel, en welke parameterkeuzes verklaren het verschil tussen mijn verwachting en het fondsresultaat". Voor een bredere achtergrond bij de problematiek die deze tool aan de orde stelt, zie ook het publieke LinkedIn-artikel van de auteur: "Communicatie Stichting Shell Pensioenfonds (SSPF) over transitie roept ergernis op" (9 februari 2026), via https://www.linkedin.com/pulse/communicatie-stichting-shell-pensioenfonds-sspf-over-roept-haringa-2yxee. Dit artikel beschrijft het patroon van eenrichtings-communicatie dat de directe aanleiding vormde voor het bouwen van een onafhankelijk reken-instrument.'},{heading:"HOE DE TOOL TOT STAND IS GEKOMEN",body:"Code, modelspecificatie, helpteksten en deze verantwoording zijn iteratief tot stand gekomen in dialoog met meerdere generatieve-AI-assistenten en bronnen: Anthropic Claude (diverse versies, waaronder eerdere generaties Sonnet en Opus en de huidige Claude 4-familie tot en met Opus 4.7) \u2014 primair voor TypeScript-implementatie van rekenkern en UI, modelspecificatie-redactie en architectuurkeuzes; Anthropic Claude Excel-add-in \u2014 voor controleberekeningen in een rekenblad en parallelle handberekeningen; PensioenGPT (custom GPT beschikbaar binnen ChatGPT) \u2014 voor domeinspecifieke navigatie van Pensioenwet, Bijlage 2a en transitieplan-praktijk; Mistral \u2014 voor afstemming en kruiscontrole van interpretaties; diverse browser-gebaseerde AI-assistenten \u2014 voor losse onderzoeksvragen en bronverificatie. Het gebruik van AI-assistenten betekent dat de auteur de wiskundige uitwerking, code en tekst kritisch heeft beoordeeld, maar dat aanwezigheid van fouten \u2014 in interpretatie van de Pensioenwet, in actuari\xEBle formules, in code, of in numerieke uitkomsten \u2014 niet kan worden uitgesloten en op een aantal punten statistisch waarschijnlijk is. Daarbij geldt dat verschillende AI-assistenten op identieke vragen niet altijd identieke antwoorden geven; waar mogelijk is met meerdere bronnen gecontroleerd, maar absolute zekerheid is daarmee niet bereikt. De tool is bewust open-source en transparant; de modelspecificatie en broncode zijn meegeleverd zodat onafhankelijke verificatie mogelijk is. De broncode is publiek beschikbaar via https://github.com/Invaarcalculator/invaarcalculator.git; de tool zelf wordt gehost via GitHub Pages (zie de Privacy-link in de footer voor de implicaties daarvan). De tool is niet beoordeeld door een gecertificeerde actuaris, niet getoetst door SSPF, niet getoetst door DNB, en niet voorzien van een vergunning van de Autoriteit Financi\xEBle Markten (AFM) voor financieel advies. De tool geeft geen persoonlijk financieel advies en is niet bedoeld als grondslag voor financi\xEBle beslissingen."},{heading:"3. HOE ONTSTAAT DE AFWIJKING TUSSEN CALCULATOR EN WERKELIJKHEID?",body:"De afwijking tussen wat deze calculator berekent en wat SSPF voor u individueel zal berekenen, heeft drie hoofdoorzaken die zich op verschillende schermen anders uiten."},{heading:"OORZAAK A \u2014 AANNAMES WAAR PUBLIEKE INFORMATIE ONTBREEKT",body:'Voor onder meer de ervaringssterftefactor, de exacte populatiesamenstelling van het deelnemersbestand, de uitvoering van de bundle-aftrekcascade (de afsplitsingen voorafgaand aan toepassing van de standaardregel) en de eventuele toepassing van een "zachte landing" voor pensioengerechtigden gebruikt de tool plausibele aannames op basis van publieke gegevens. Belangrijkste bronnen: SSPF-transitieplan juli 2024 (Bijlage 8 demografie), Ortec Finance Uitgangspuntendocument Transitierapportage SSPF/SNPS versie 2024.1 (Bijlage B ervaringssterfte), CBS levensverwachting-data, SSPF-implementatieplan juli 2025 en publieke presentatie 14 april 2026. De werkelijke ABTN van SSPF bevat hier specifiekere waarden waar de tool geen toegang toe heeft.'},{heading:"OORZAAK B \u2014 VEREENVOUDIGINGEN TEN OPZICHTE VAN EEN VOLLEDIGE UITVOERINGSPRAKTIJK",body:"Niet gemodelleerd zijn onder andere: stochastische scenario-analyse (goed/mediaan/slecht-weerscenario's), de rendementsdynamiek na invaren met vijfjaars-spreiding van schokken zoals voorzien in de Wtp, de leeftijdsafhankelijke beleggingsmix (lifecycle), de dempingswerking van de risicodelingsreserve (RDR) na invaren, het exacte moment van de invaardatum (1 januari 2027) versus de peildatum van de dekkingsgraad die in de tool wordt gehanteerd, en de zogenoemde 67%-randvoorwaarde uit artikel 150n lid 4 Pensioenwet (Pw) die de toedeling tussen cohorten beperkt."},{heading:"OORZAAK C \u2014 UW EIGEN INPUT",body:"Leeftijd, jaarpensioen, eventueel hoog-laag-bedragen, partner-aanwezigheid en partner-leeftijd vult u zelf in. Als deze afwijken van uw werkelijke Uniform Pensioenoverzicht (UPO) of pensioenadministratie, dan klopt de berekening voor uw werkelijke situatie niet \u2014 ook al doet de tool wiskundig wat hij hoort te doen. Vergelijk uw invoer daarom vooraf met uw UPO."},{heading:"4. IMPLICATIES PER SCHERM EN BRONNEN VAN ONNAUWKEURIGHEID",body:'Onderstaand wordt per uitvoerblok in de calculator aangegeven welke parameters de uitkomst het sterkst be\xEFnvloeden en welke onzekerheidsbronnen actief zijn. Er worden bewust geen harde foutmarges genoemd. Dat zou valse precisie suggereren, want voor de meeste uitkomsten is geen empirische kalibratie tegen werkelijke SSPF-uitkomsten beschikbaar \u2014 die uitkomsten worden immers pas zichtbaar in de individuele transitiebrieven na invaardatum. In plaats daarvan kan de gebruiker zelf de gevoeligheid verkennen: via sliders en invoervelden voor parameters waarbij de gebruiker zelf de waarde kiest (leeftijd, jaarpensioen, partner-aanwezigheid, partner-leeftijd en partnerpensioen, hoog-laag-regeling, rekenrente, en in het tweede pane de cascade-componenten); via de keuzelijst "Spreidingstermijn" in het derde pane (keuze tussen "10 jaar" en "Oneindig"); en via drie knoppen onderaan die een grafische visualisatie tonen ("Verhoging vs. indexatie" voor het tijdspad van uw uitkering; "Effect dekkingsgraad" en "Effect werkgevers-bijdrage" als doorlopen over een parameterbereik), plus een vierde knop "Modelspecificatie" die een PDF-rapport opent met de formele uitwerking van het rekenmodel.'},{heading:"STARTSITUATIE EN RESET",body:'Bij eerste opening van de tool zijn alle parameters ingesteld op de SSPF-standaardwaarden: deelnemer 70 jaar man, jaarpensioen \u20AC 100.000, geen partner; fondsvermogen \u20AC 26.000 mln, dekkingsgraad 136,1%, bijstort \u20AC 500 mln, spreidingstermijn "Oneindig". U vult uw eigen gegevens in het bovenste pane in. De fondsparameters in het pane "Tekort of overschot" staan op de actuele SSPF-waarden. Zodra een fondsparameter afwijkt van de SSPF-standaardwaarde verschijnt in de header van dat pane een "Bewerkt"-label met een Reset-knop, waarmee alle cascade-componenten met \xE9\xE9n klik terug naar de fondsuitgangswaarden gaan. De uitvoerblokken worden hieronder besproken in dezelfde volgorde als zij in de calculator verschijnen.'},{heading:'PANE "UW HUIDIGE PENSIOENAANSPRAAK"',body:"Dit pane bevat de invoervelden voor uw persoonlijke gegevens en toont onderaan de huidige waarde van uw aanspraak, opgebouwd uit ouderdomspensioen en, indien van toepassing, partnerpensioen. Wiskundig is dit het meest robuuste blok: de annu\xEFteits-mechaniek volgt rechtstreeks uit de AG2024-prognosetafel van het Koninklijk Actuarieel Genootschap (KAG) en de gekozen disconteringsvoet. De belangrijkste onzekerheidsbron is de ervaringssterfte-factor (in dit model vlakke f=0,76, gekalibreerd zodat het fonds-totaal annu\xEFteitsbedrag onder onze vlakke f gelijk is aan dat onder Bijlage B van het Ortec Uitgangspuntendocument 2024.1 voor de SSPF-populatie. Bijlage B specificeert de \xE9chte SSPF-ervaringssterfte per leeftijd \xD7 geslacht: voor mannen 15-54 zou f=0,50 zijn, oplopend met de leeftijd naar f=1,0 rond 96; voor vrouwen 15-64 f=0,70, oplopend naar f=1,0 rond 100. Onze vlakke benadering is daarmee voor jongere deelnemers (<50) iets te conservatief en voor de oudste cohorten (>85) iets te aggressief, maar voor de meest gebruikte scenario's (65-75) zit het er dicht op). De tweede onzekerheidsbron is de vlakke rekenrente versus de werkelijke rentetermijnstructuur (RTS) per looptijd zoals gepubliceerd door DNB. Voor een individu met correcte invoer is dit blok robuust in orde-van-grootte; absolute kalibratie tegen SSPF-administratie is niet mogelijk omdat die niet publiek is. De rekenrente is via de slider direct aanpasbaar voor wie de RTS-gevoeligheid wil verkennen."},{heading:'PANE "TEKORT OF OVERSCHOT"',body:"Dit pane toont de cascade waarmee het beschikbare fondsvermogen na afsplitsing van wettelijke en bestemmingsreserves leidt tot het verdeelbare overschot dat via de standaardregel over deelnemers wordt verdeeld. De dominante onzekerheidsbron is de bundle-aftrekcascade zelf: het transitieplan beschrijft de bestemmingen (wettelijke reserves, RDR, compensatiedepot), maar niet de exacte allocatiebedragen op invaardatum. De tool gebruikt voor de cascade-componenten de waarden die SSPF in de publieke communicatie noemt (wettelijke reserves 2%, RDR \u20AC 500 mln, compensatiedepot \u20AC 400 mln), maar deze kunnen op de werkelijke invaardatum (1 januari 2027) afwijken van de stand die nu in de tool is opgenomen. Een tweede onzekerheidsbron is de dekkingsgraad zelf: de tool gebruikt de stand eind februari 2026 (136,1%); de werkelijke invaardekkingsgraad ligt op invaardatum vast. Beide onzekerheden zijn via de sliders in dit pane direct te verkennen; afwijkingen van de fondsstandaardwaarde zijn terug te zetten via de Reset-knop die dan verschijnt."},{heading:'PANE "UW PERSOONLIJK PENSIOENVERMOGEN NA INVAREN"',body:'Dit pane toont in drie gekleurde regels onder elkaar hoe het persoonlijk pensioenvermogen tot stand komt, plus daaronder een regel die het jaarpensioen-equivalent aangeeft. Eerste regel (groen, "Uw huidige pensioenaanspraak"): identiek aan de uitkomst van het eerste pane; herhaald hier als startwaarde. Tweede regel (amber, "Uw aandeel verdeelbaar overschot"): toont wat aan uw huidige aanspraak wordt toegevoegd; per definitie het verschil van twee onzekere getallen, en daarmee relatief het meest gevoelig voor onnauwkeurigheid. Voor kleine verdeelbare overschotten kan een kleine absolute afwijking in \xE9\xE9n van beide invoergetallen een grote relatieve afwijking in het aandeel opleveren. Bij negatief saldo verandert het label naar "Uw aandeel verdeelbaar tekort". Derde regel (rood, "Uw persoonlijk pensioenvermogen", totaal na invaren): erft de onzekerheid van de twee voorgaande regels en voegt \xE9\xE9n modelaanname toe \u2014 de keuze van spreidingstermijn (de tool implementeert de keuze van SSPF voor levenslang via de keuzelijst-optie "Oneindig"). Een aanvullende structurele onzekerheid is de cohort-demografie: de tool gebruikt een voorinstelling "gesloten"; werkelijke SSPF-aantallen zijn niet publiek.'},{heading:"JAARPENSIOEN-EQUIVALENT-REGEL",body:'De regel onder de drie gekleurde regels ("\u2248 + \u20AC X extra ... per jaar pensioen levenslang") erft de onzekerheid van het aandeel verdeelbaar overschot en voegt \xE9\xE9n modelaanname toe: proportionele doorwerking van ouderdomspensioen en partnerpensioen onder de keuze van SSPF voor levenslange spreiding. Onder de wettelijke standaardspreiding van tien jaar zou deze proportionaliteit niet exact gelden (zie helptekst van dit veld en \xA79 van de Modelspecificatie); de keuze van SSPF maakt de aanname robuust binnen de SSPF-context. Het helptekst-icoon naast deze regel bevat verdere uitleg over hoe het partnerpensioen meestijgt bij verhoging van het persoonlijk pensioenvermogen.'},{heading:'KNOP "VERHOGING VS. INDEXATIE" (EERSTE KNOP)',body:'Opent een pedagogische "wat-als"-grafiek. Toont de vlakke "ingevroren" uitkering na invaren versus een hypothetische voortzetting met indexatie. De werkelijke uitkeringspaden onder de Wtp zijn variabel (rendement, levensverwachting, solidariteits- of risicodelingsreserve-werking, lifecycle-mix per cohort) en niet door deze grafiek te voorspellen. Gebruik de grafiek strikt qua richting \u2014 voor het verkrijgen van inzicht in het kruispunt waarboven indexatie de vlakke uitkering inhaalt, niet als kwantitatieve voorspelling.'},{heading:'KNOP "EFFECT DEKKINGSGRAAD" (TWEEDE KNOP)',body:'Toont de gevoeligheid van het persoonlijk pensioenvermogen voor de invaardekkingsgraad over een doorlooptraject. De helling van de curve volgt direct uit de mechaniek van de standaardregel en is wiskundig hard; de absolute uitlees-waarden erven de onzekerheid van "Uw persoonlijk pensioenvermogen". Gebruik primair de helling, niet de absolute waarden.'},{heading:'KNOP "EFFECT WERKGEVERS-BIJDRAGE" (DERDE KNOP)',body:"De bijstort is door de gebruiker zelf in te stellen via slider in het tweede pane (0\u20132500 mln). De grafiek toont correct het effect van die specifieke bijstort op het persoonlijk pensioenvermogen. De staffel uit implementatieplan \xA75.5 (\u20AC 500m bij dekkingsgraad \u2265135%, \u20AC 650m bij 130\u2013135%, \u20AC 850m bij 125\u2013130%) is bewust niet automatisch gekoppeld aan de dekkingsgraad-slider \u2014 de gebruiker stelt zelf de combinatie dekkingsgraad/bijstort in die hij/zij wil modelleren. Bij correcte handmatige invoer is de grafiek zowel qua richting als kwantitatief informatief."},{heading:'KNOP "MODELSPECIFICATIE" (VIERDE KNOP)',body:"Opent een PDF met de formele uitwerking van wat de calculator doet \u2014 niet wat SSPF doet. Heeft zelf geen bandbreedte; geeft daarentegen de gebruiker (of een derde \u2014 actuaris, lid van het verantwoordingsorgaan, journalist) de mogelijkheid om de implementatie regel voor regel te toetsen."},{heading:"ONAFHANKELIJKE VERIFICATIE VIA ABN AMRO PENSIOENFONDS",body:`Een concreet referentiepunt voor de plausibiliteit van de calculator-uitkomsten is de vergelijking met publieke deelnemerscommunicatie van ABN AMRO Pensioenfonds (hierna: ABN). ABN heeft in zijn transitieplan (17 oktober 2024) en implementatieplan (22 september 2025) per leeftijdscohort en dekkingsgraad een transparant overzicht van invaareffecten gepubliceerd; deze cijfers zijn tevens opgenomen in de uitspraak van het College voor de Rechten van de Mens d.d. 4 maart 2026 (oordeelnummer 2026-34). ABN hanteert de wettelijke standaardspreidingstermijn van tien jaar. Onderstaande twee tabellen tonen voor pensioengerechtigden bij invaardekkingsgraad 135% de procentuele verhoging van het persoonlijk pensioenvermogen op transitiedatum, berekend met de productie-rekenkern van deze calculator (versie ${t}). Tabel A vergelijkt een scenario zonder partner met de publieke cohort-cijfers van ABN; Tabel B toont dezelfde berekening met partner volgens de SSPF-standaardwaarden.`},{heading:"TABEL A \u2014 ZONDER PARTNER (VERGELIJKBAAR MET ABN-PUBLIEKE COHORT-CIJFERS)",tableHeaders:["Leeftijd","ABN spreiding 10 jaar (publiek)","SSPF spreiding 10 jaar (rekenkern)","SSPF spreiding oneindig (rekenkern, keuze SSPF)","\u0394 10 \u2192 oneindig"],tableRows:[["65 jaar","24%","+29,7%","+28,8%","\u22120,9 pp"],["75 jaar","20%","+24,4%","+19,5%","\u22124,9 pp"],["85 jaar","17%","+16,1%","+11,3%","\u22124,8 pp"],["95 jaar","12%","+8,7%","+5,9%","\u22122,8 pp"]]},{heading:"TABEL B \u2014 MET PARTNER (VROUW 3J JONGER, PARTNERPENSIOEN \u20AC 70.000)",tableHeaders:["Leeftijd","Partner","SSPF spreiding 10 jaar (rekenkern)","SSPF spreiding oneindig (rekenkern, keuze SSPF)","\u0394 10 \u2192 oneindig"],tableRows:[["65 jaar","62V","+31,8%","+34,2%","+2,4 pp"],["75 jaar","72V","+27,8%","+24,3%","\u22123,5 pp"],["85 jaar","82V","+20,5%","+15,0%","\u22125,4 pp"],["95 jaar","92V","+11,8%","+8,0%","\u22123,7 pp"]]},{heading:"DRIE OBSERVATIES BIJ DEZE CIJFERS \u2014 LEERZAME WAARDE VAN DE TOOL",body:'Eerste observatie: in de vergelijking zonder partner (Tabel A) komt de SSPF-rekenkern voor jongere pensioencohorten hoger uit dan ABN (+5,7 pp bij 65 jaar, +4,4 pp bij 75 jaar), is nagenoeg gelijk bij 85 jaar, en komt lager uit bij 95 jaar (\u22123,3 pp). Dat afwijkende patroon \u2014 geen uniforme over- of onderschatting \u2014 is verklaarbaar door fondsspecifieke parameters waarop SSPF en ABN substantieel verschillen: SSPF heeft een kleinere bundle-aftrek (cascade-gewogen 6,71% versus de door ABN gerapporteerde circa 10%) plus een transitiebijdrage van \u20AC 500 mln die ABN niet kent in deze vorm. Voor oudere cohorten domineren demografie en spreidingsmechaniek. Tweede observatie: in Tabel A is het effect van spreiding 10 jaar \u2192 spreiding oneindig leeftijdsafhankelijk: bijna verwaarloosbaar bij 65 jaar (\u22120,9 pp), groter rond 75\u201385 jaar (circa \u22125 pp), kleiner bij 95 jaar (\u22122,8 pp). Het zwaartepunt van het nadeel ligt bij de cohorten waar de SSPF-pensioenverplichting concentreert (75\u201385 jarigen). Derde observatie \u2014 de "verrassing": in Tabel B met partner draait het teken om voor het jongste cohort: voor een 65-jarige met 62-jarige partner geeft spreiding oneindig een hogere opslag dan spreiding 10 jaar (+2,4 pp voordeel in plaats van nadeel). Verklaring: het zwaartepunt van de partnerpensioen-kasstromen ligt ver in de toekomst (15 tot 30 jaar \u2014 periode waarin de partner nog leeft na overlijden van de gepensioneerde). Onder spreiding 10 jaar wordt die kasstroom volledig meegenomen in de aanpassing; onder spreiding oneindig fractioneel \u2014 maar de schalingsfactor is dan navenant hoger om hetzelfde fondsvermogen te verdelen. Voor lange horizonnen \u2014 die een jonge partner garandeert \u2014 werkt spreiding oneindig dan netto gunstig uit. Deze derde observatie illustreert de leerzame waarde van de tool: de claim dat "alle pensioengerechtigden worden benadeeld door de spreidingskeuze" is een te simpele samenvatting; de werkelijkheid is leeftijds- en partnersituatie-afhankelijk.'},{heading:"TOT SLOT BIJ DEZE VERGELIJKING",body:"Het feit dat ABN een dergelijke transparante cohort-tabel \xFCberhaupt publiek heeft gemaakt, terwijl SSPF cohort-specifieke doorrekeningen niet beschikbaar stelt aan zijn deelnemers, raakt de kern van het probleem dat deze tool aan de orde stelt. Een fondsdeelnemer bij ABN kan zonder hulpmiddelen zien wat hij of zij ongeveer kan verwachten; een SSPF-deelnemer is voor diezelfde informatie aangewezen op een onafhankelijke reconstructie zoals deze calculator."},{heading:"5. WAT U WEL UIT DEZE TOOL KUNT HALEN",body:"Ondanks de in \xA73 en \xA74 benoemde beperkingen biedt de tool naar de mening van de auteur drie soorten waarde. Eerste waarde \u2014 begrip van de mechaniek: de tool toont wat de standaardregel uit Bijlage 2a Regeling Pensioenwet doet, welke parameters daarin een rol spelen, en hoe dekkingsgraad, transitiebijdrage en spreidingstermijn op elkaar inwerken. Een SSPF-deelnemer die anders alleen een eindbedrag in een transitiebrief zou zien, kan met deze tool zelfstandig nagaan welke stappen dat eindbedrag opbouwen. Tweede waarde \u2014 gevoeligheidsbesef: de drie visualisatie-knoppen, in combinatie met de sliders in de drie panes, laten zien aan welke parameters de uitkomst gevoelig is en aan welke niet. Derde waarde \u2014 gespreksvoorbereiding: met een richtindicatie van de orde van grootte kan de gebruiker het gesprek aangaan met SSPF, met collega's, in het verantwoordingsorgaan, in de ALV van Voeks of een andere belangenvereniging, of in correspondentie met DNB. De tool helpt om gerichte vragen te formuleren over de keuzes die SSPF in het transitie- en implementatieplan heeft gemaakt \u2014 niet om die keuzes te bestrijden zonder feitelijke basis, maar om ze toetsbaar te maken. Bij elk van deze drie soorten waarde geldt dat de tool een hulpmiddel is om vragen scherper te stellen, niet om ze definitief te beantwoorden."},{heading:"6. WAT U EXPLICIET NIET UIT DEZE TOOL KUNT HALEN",body:`De tool is niet ontworpen voor andere pensioenfondsen dan SSPF. Binnen de SSPF-context geldt het volgende. De tool geeft geen voorspelling van uw werkelijke pensioenuitkering per maand of jaar na invaren \u2014 die wordt bepaald door SSPF op basis van de definitieve invaardekkingsgraad, de werkelijke fondsbalans op invaardatum, en uw individuele aanspraak zoals geregistreerd in de pensioenadministratie. Evenmin levert de tool een voorspelling over het verloop van uw pensioen in de tijd. Voor een bezwaarprocedure biedt de tool geen onderbouwing: onder de Wtp is een individueel bezwaarrecht tegen invaren wettelijk niet voorzien; de besluitvorming is collectief via sociale partners en het fondsbestuur, met toetsing door DNB op evenwichtigheid voor groepen, niet voor individuen. Wel kan de tool dienen als rekenkundige onderbouwing voor een zienswijze richting DNB of een vraag aan het fondsbestuur. Een grondslag voor financi\xEBle planning of individuele beslissingen omtrent eerder stoppen met werken, partnerverlof, aanvullende verzekeringen of fiscale optimalisatie wordt evenmin geboden. Voor dat soort beslissingen zijn de transitiebrief van SSPF, persoonlijk financieel advies van een gecertificeerd adviseur, en (waar relevant) overleg met uw werkgever of een belastingadviseur de juiste bronnen. Niet inbegrepen is informatie over de evenwichtigheidstoets die SSPF tussen verschillende cohorten heeft uitgevoerd. Die toets vereist toegang tot transitiematen (netto profijt per cohort, pensioenverwachting in goed-mediaan-slechtweer-scenario's, gemiddelde kortingskans over 15 jaar) die in het implementatieplan zijn opgenomen voor de SSPF-gekozen spreiding maar niet vergelijkend zijn doorgerekend voor andere parameterkeuzes \u2014 een aspect dat in de zienswijze aan DNB van 2 mei 2026 uitdrukkelijk wordt gevraagd. Tot slot ontbreekt informatie over fondskeuzes die buiten de standaardregel vallen, zoals de zogenoemde "zachte landing" of egalisatie-correctie binnen het cohort gepensioneerden, de exacte toepassing van de 67%-randvoorwaarde uit artikel 150n lid 4 Pensioenwet, en de wijze waarop de RDR na invaren wordt aangewend ter demping van kortingen.`},{heading:"7. BRONNEN EN VERSIES",body:'Wet- en regelgeving: de Wtp (Staatsblad 2023, 217), de Pensioenwet zoals gewijzigd door de Wtp, het Besluit uitvoering Pensioenwet en Wet verplichte beroepspensioenregeling (specifiek artikel 46 lid 2), de Regeling Pensioenwet en Wet verplichte beroepspensioenregeling met name Bijlage 2a (de "standaardregel"; laatstelijk gewijzigd Staatscourant 2025, 15094), en de Q&A "Onderbouwing spreidingstermijn standaardregel" gepubliceerd door DNB op 23 juni 2025. Toezichts- en sectordocumenten: de DNB-factsheet "Omrekenmethoden en aanwenden vermogen pensioenfonds bij invaren", het servicedocument van de Pensioenfederatie over nabestaandenpensioen onder de Wtp, en de KAG-prognosetafels AG2024 (publicatie 12 september 2024). SSPF-specifieke documenten: het transitieplan, het op 15 juli 2025 vastgestelde Wtp-implementatieplan SSPF, de SSPF-presentatie van 14 april 2026, en het SSPF-jaarverslag 2024. Niet-publieke documenten waar SSPF wel over beschikt en die de tool niet kan benutten: de ABTN, de individuele pensioenadministratie per deelnemer, en de cohort-specifieke transitiematen. Vergelijkende bronnen: het ABN AMRO Pensioenfonds-transitieplan van 17 oktober 2024, het ABN AMRO Pensioenfonds-implementatieplan van 22 september 2025, en de uitspraak van het College voor de Rechten van de Mens van 4 maart 2026 (oordeelnummer 2026-34). Analyses en commentaar: Willis Towers Watson, "Uiteenlopende invullingen van de eerbiediging van partnerpensioen" in Pensioen Update (februari 2025); Ortec Finance, "De standaardmethode voor invaren wordt de norm" en "Spreidingsperiode bij toepassing standaardmethode"; diverse publieke transitie-communicaties van Nederlandse pensioenfondsen (Pensioenfonds Zorg en Welzijn, PMT, bpfBOUW, PME, ABP en andere) ten behoeve van vergelijking. Versies en peildatums: de calculator-versie en de bouwdatum staan onderaan elk scherm. De rekenkern krijgt een nieuwe versie bij elke wijziging; de modelspecificatie (toegankelijk via de knop "Modelspecificatie") volgt dezelfde versionering. De ingebedde modelspecificatie-PDF wordt periodiek bijgewerkt en kan tijdelijk een versie achterlopen op de UI. De peildatum voor SSPF-fondsgegevens (dekkingsgraad 136,1%, fondsvermogen \u20AC 26.000 mln) is eind februari 2026. De werkelijke invaardatum is per 1 januari 2027; de calculator-uitkomsten zijn een momentopname die op invaardatum afwijkt naarmate de dekkingsgraad of fondsbalans zich in de tussentijd anders ontwikkelt.'},{heading:"8. CONTACT EN FEEDBACK",body:"Voor inhoudelijke opmerkingen, ontdekte fouten of suggesties voor verbetering kunt u contact opnemen via het e-mailadres in de footer van deze tool. De auteur waardeert correcties, parameter-bronverwijzingen en gevoeligheidsanalyses die de tool verder kunnen verbeteren, en stelt updates van de tool in het vooruitzicht zodra significante nieuwe publieke informatie beschikbaar komt \u2014 bijvoorbeeld na de DNB-uitspraak over de SSPF-invaarmelding, of na publicatie van de individuele transitiebrieven aan SSPF-deelnemers per 1 januari 2027. Voor uw eigen pensioenvragen, vragen over uw werkelijke aanspraak, of bezwaren tegen onderdelen van uw transitie verwijst de auteur naar SSPF, via de kanalen die het fonds zelf aanwijst. Deze tool is geen vervanging van SSPF-communicatie en biedt geen mogelijkheid om individuele dossiers te behandelen. De drie documenten en het LinkedIn-artikel zoals genoemd in \xA72 zijn opvraagbaar via hetzelfde e-mailadres."}]}),Zn={privacy:ei,uitleg:ti,verantwoording:ni};var Gn={...Fn,...Kn,...Hn,...Zn};var st=[],Un=!1;function ri(){Un||(Un=!0,document.addEventListener("keydown",t=>{if(t.key!=="Escape")return;let e=st[st.length-1];e&&e.close()}))}function Wn(t,e){let n=document.body;if(n)for(let r of Array.from(n.children))r!==t&&r.tagName!=="SCRIPT"&&(e?r.setAttribute("inert",""):r.removeAttribute("inert"))}var ai=["a[href]","button:not([disabled])","input:not([disabled])","select:not([disabled])","textarea:not([disabled])",'[tabindex]:not([tabindex="-1"])'].join(",");function qn(t){return Array.from(t.querySelectorAll(ai)).filter(n=>!n.hasAttribute("hidden"))}function an(t,e,n){if(typeof document>"u")return{open(){},close(){},get isOpen(){return!1}};let r=document.getElementById(t),a=e?document.getElementById(e):null,i=document.getEleme

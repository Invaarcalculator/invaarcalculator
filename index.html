<script>
(function() {
  function showError(label, msg) {
    var d = document.getElementById('js-error-display');
    if (d) {
      d.style.display = 'block';
      d.textContent = label + ': ' + msg;
    }
  }
  // v3.0.139-tooling: filter noise van browser-extensies. Extensies
  // injecteren scripts in de pagina-context; hun unhandled errors en
  // promise-rejections triggeren onze window-level listeners, ook al
  // hebben ze niets met de calculator te maken. Concreet geval dat
  // dit triggerde: Malwarebytes Browser Guard (Safari-extensie) gooit
  // 'ReferenceError: Can't find variable: output' in shell.js — zie
  // HANDOFF_v3.0.139-tooling §1.5. Voor de gebruiker is de
  // calculator-error-banner dan misleidend.
  //
  // Detectie: extensie-scripts hebben URL's met schemes die
  // 'extension://' of 'webkit-masked-url://' bevatten. We gebruiken
  // String.includes() voor leesbaarheid en consistentie met moderne JS.
  // (v3.0.166-tooling: indexOf(...) !== -1 vervangen door includes()
  // op aanwijzing van SonarCloud — zie L1574/L1575.) Regex blijft hier
  // bewust niet gebruikt: regex-escape-quoting in een template-literal-
  // gebouwde HTML-bundle is een valstrik (zie v3.0.139-tooling §3 voor
  // de regex-bug die hier op gebrand stond).
  // Voor 'error'-events staat het pad in e.filename; voor
  // 'unhandledrejection' moeten we in de stack-trace kijken, want
  // filename ontbreekt daar.
  function isExtensionUrl(s) {
    if (!s) return false;
    s = String(s);
    return s.includes('extension://')
        || s.includes('webkit-masked-url://');
  }
  function isExtensionError(reason) {
    if (!reason) return false;
    // reason kan een Error-object zijn (met .stack) of een primitive string
    var stack = (typeof reason === 'object' && reason.stack) ? String(reason.stack) : '';
    var msg = (typeof reason === 'object' && reason.message) ? String(reason.message) : String(reason);
    return isExtensionUrl(stack) || isExtensionUrl(msg);
  }

  // v3.0.166-tooling: window.* → globalThis.* op aanwijzing van SonarCloud
  // (Prefer globalThis over window, L1585/1588/1593/1595). globalThis is
  // de moderne portable manier; in een browser is hij identiek aan window.
  globalThis.addEventListener('error', function(e) {
    if (isExtensionUrl(e.filename) || isExtensionError(e.error)) {
      // Stille negeer; loggen voor diagnose-debug zonder de gebruiker te storen.
      if (globalThis.console && console.debug) console.debug('[extensie-noise genegeerd]', e.message, e.filename);
      return;
    }
    showError('JS-fout', (e.message || 'onbekend') + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
  });
  globalThis.addEventListener('unhandledrejection', function(e) {
    if (isExtensionError(e.reason)) {
      if (globalThis.console && console.debug) console.debug('[extensie-noise genegeerd]', e.reason);
      return;
    }
    showError('Promise-fout', (e.reason && e.reason.message) || String(e.reason));
  });

  // v3.0.120: 2s → 5s. iPad Safari first-load triggerde false-positive op
  // 2s bij grote inline-blobs (524 KB PDF-base64 + 82 KB AG2024 + 142 KB
  // bundle); parsing was nog bezig terwijl detector al vuurde. Cached
  // refreshes en andere browsers (Firefox/DuckDuckGo op iOS) hadden geen
  // last. 5s geeft Safari ruimte zonder echte init-fouten te verbergen.
  setTimeout(function() {
    var app = document.getElementById('app');
    if (app && app.innerHTML.trim() === '') {
      showError('Init', 'JS-bundle uitgevoerd maar #app bleef leeg na 5s. Browser ondersteunt mogelijk een gebruikt feature niet. UA: ' + navigator.userAgent);
    }
  }, 5000);
})();

    ${s}
  </div>`}var mi=()=>({title:"Privacy",sections:[{heading:"GEEN INVOER VERLAAT UW BROWSER",body:"Deze tool werkt volledig lokaal in uw browser. Uw invoer (leeftijd, jaarpensioen, partnergegevens, en alle andere parameters die u aanpast) wordt niet verstuurd naar een server, niet opgeslagen, niet gedeeld met derden, en niet gebruikt voor analyse of profilering. De berekeningen vinden plaats in JavaScript-code die met de webpagina is meegestuurd; sluiten van het tabblad of de browser wist alle gegevens."},{heading:"GEEN COOKIES, GEEN TRACKING",body:"De tool plaatst geen cookies, gebruikt geen webanalyse, en bevat geen externe tracking-scripts."},{heading:"HOSTING VIA GITHUB PAGES",body:"Deze tool wordt gehost via GitHub Pages (een dienst van GitHub, Inc., onderdeel van Microsoft). Bij het ophalen van de pagina door uw browser legt GitHub standaard HTTP-server-gegevens vast \u2014 IP-adres, gebruikte browser, tijdstip van bezoek, opgevraagde bestanden \u2014 voor beveiligings- en infrastructuurdoeleinden. Dit gebeurt buiten invloed van de auteur. Voor het privacy-beleid van GitHub: https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement."}]}),fi=()=>({title:"Uitleg",sections:[{heading:"",body:"De Wet toekomst pensioenen (Wtp) hervormt het Nederlandse pensioenstelsel. Uw huidige pensioenrecht wordt omgezet naar een persoonlijk pensioenvermogen op uw naam, dat na invaren meebeweegt met de beleggingsresultaten van uw fonds."},{heading:"VOOR WIE IS DEZE REKENTOOL?",body:`Voor wie ${U.shortLabel??""}-pensioen ontvangt na de AOW-leeftijd. Wie nog werkt, vervroegd pensioen tot de AOW heeft, of een aanspraak heeft die nog niet uitkeert, valt buiten deze berekening.`},{heading:"WAT BEREKENT DEZE REKENTOOL?",body:"De rekentool laat zien wat invaren voor u zou betekenen op het invaarmoment zelf. U ziet twee bedragen: uw huidige pensioenaanspraak (de waarde vandaag van uw lopende pensioen) en uw persoonlijk pensioenvermogen na invaren (wat hiervan aan u zou worden toebedeeld volgens de wettelijke standaardregel). Hoe uw jaarlijkse uitkering zich na invaren ontwikkelt, zit nog niet in deze versie."},{heading:"WAT KUNT U HIER DOEN?",body:"U vult uw gegevens uit het Uniform Pensioenoverzicht (UPO) in: leeftijd, geslacht, bruto jaarpensioen en eventueel partnergegevens. Heeft u nu een hoog-laag-uitkering \u2014 een tijdelijk hoger pensioen tot een afgesproken knip-datum, daarna een lager bedrag levenslang \u2014 vul dan ook het lage bedrag en de knip-datum in. De fondsparameters staan al op de actuele waarden, dus na invoer van uw UPO-gegevens bent u meteen klaar. Wilt u onderzoeken hoe gevoelig uw uitkomst is voor verschillende aannames, dan verschuift u de fondsparameters via de sliders om bijvoorbeeld een andere dekkingsgraad te beproeven. Een Reset-knop verschijnt zodra u afwijkt van de fonds-uitgangswaarden."}]}),gi=({releaseVersion:t})=>({title:`Verantwoording bij de Invaarcalculator (versie ${t})`,sections:[{heading:"1. WAT IS DEZE TOOL EN WAT IS HET NIET?",body:"Deze Invaarcalculator is een onafhankelijk, niet door Stichting Shell Pensioenfonds (SSPF) erkend of gevalideerd reken-instrument dat poogt de orde van grootte zichtbaar te maken van de invaareffecten voor een SSPF-deelnemer onder de Wet toekomst pensioenen (Wtp). De tool implementeert de wettelijke standaardregel (Bijlage 2a Regeling Pensioenwet) op basis van uitsluitend publiek beschikbare bronnen en redelijke aannames waar publieke informatie ontbreekt. De uitkomsten zijn per definitie niet identiek aan wat SSPF voor u individueel berekent. SSPF beschikt over niet-publieke gegevens (uw werkelijke aanspraak in de pensioenadministratie, fondsspecifieke uitvoeringskeuzes uit de actuari\xEBle en bedrijfstechnische nota (ABTN), de definitieve dekkingsgraad op invaardatum, de exacte populatiesamenstelling, eventuele afwijkingen van de standaardregel die in het transitieplan zijn vastgelegd) waar deze tool geen toegang toe heeft. Aan de uitkomsten kunnen geen rechten worden ontleend. Voor uw werkelijke invaarpositie zijn alleen de transitiebrief en de definitieve berekening van SSPF zelf maatgevend."},{heading:"2. DOOR WIE EN WAAROM IS DEZE TOOL GEMAAKT?",body:"Deze tool is ontwikkeld door drs. ing. H. Haringa (Innovation Nestor) als publiek en onafhankelijk studieproject. De aanleiding ligt in de SSPF-transitie naar de Wtp en de constatering dat fondsleden \u2014 gepensioneerden, actieven en slapers \u2014 geen instrument tot hun beschikking hebben om de fondscommunicatie zelfstandig te toetsen."},{heading:"DE AANLEIDING",body:'Op 14 april 2026 stemde de Algemene Ledenvergadering (ALV) van Voeks (vereniging van Shell-gepensioneerden) over een ledenmotie "Toetsbare onderbouwing van een aantoonbaar toereikende en evenwichtige transitiebijdrage als compensatie voor het vervallen van de sponsorgarantie". De motie werd verworpen (41 voor, 64 tegen). De inhoudelijke kern bleef daarmee onbeantwoord: een kwantitatieve onderbouwing van de hoogte van de aangeboden transitiebijdrage \u2014 bezien tegen de waarde van de vervallende sponsorgarantie \u2014 is publiek niet beschikbaar. Fondsleden worden geacht een ingrijpend en onomkeerbaar besluit te accepteren zonder zelf over een toetsmiddel te beschikken.'},{heading:"EEN BREDERE OBSERVATIE",body:'Bijna geen enkel Nederlands pensioenfonds biedt zijn deelnemers op het moment van invaren een "digital twin" \u2014 een interactief reken-instrument waarmee deelnemers de invaareffecten op hun eigen situatie kunnen verkennen. De rekenmethodiek uit Bijlage 2a Regeling Pensioenwet is publiek beschreven; de individuele uitwerking blijft voor de deelnemer een zwarte doos waarvan alleen de eindstand zichtbaar wordt \u2014 en pas n\xE1 de transitie definitief. Dat dwingt deelnemers in een passieve positie: vertrouwen op het fonds, of accepteren zonder verificatie. Voor een transitie van deze omvang \u2014 waarbij het renterisico, beleggingsrisico en levensduurrisico goeddeels van fonds naar deelnemer verschuift \u2014 is dat een onbevredigende situatie. Deze tool is een eerste poging die leemte voor SSPF-deelnemers te dichten.'},{heading:"WAARTOE DE TOOL DIENT \u2014 TYPE VRAGEN DIE ERMEE ONDERBOUWD KUNNEN WORDEN",body:'De auteur heeft de tool zelf gebruikt als rekenkundige onderbouwing voor drie documenten gericht aan SSPF respectievelijk De Nederlandsche Bank (DNB). Het eerste is een zienswijze aan DNB van 1 september 2025 over het wegvallen van de Shell-sponsorgarantie en de ontoereikendheid van de Shell-bijdrage als afkoop daarvan. Het tweede is een vragenbrief aan SSPF van 2 mei 2026 met vijf kwantitatieve vragen over de keuze voor een levenslange spreidingsperiode in plaats van de wettelijke standaard van tien jaar (hoofdstuk 5.6 van het implementatieplan). Die vragenbrief verzoekt om vergelijkende doorrekening van transitiemaatstaven, kwantificering van de buffer-toedeling per cohort, het effect op de Shell-bijdrage onder beide spreidingsregimes, uitsplitsing naar deelnemersgroepen, en de vraag of de risicodelingsreserve (RDR) feitelijk fungeert als compensatie voor het lagere bufferaandeel. Het derde document is een aanvullende zienswijze aan DNB van 2 mei 2026 met drie verzoeken: om de wettelijke tweeledige onderbouwingsplicht voor afwijking van de standaard spreidingstermijn te toetsen, om het ontbreken van een vergelijkende kwantitatieve onderbouwing te betrekken bij de invaartoetsing, en om de evenwichtige belangenafweging voor de spreidingstermijnkeuze zelfstandig te toetsen. Deze documenten zijn opvraagbaar via het e-mailadres in de footer van deze tool. Zij illustreren welk soort vragen met deze calculator inhoudelijk kan worden voorbereid: niet "wat wordt mijn precieze uitkering" \u2014 dat blijft voorbehouden aan SSPF \u2014 maar "is de orde van grootte plausibel, en welke parameterkeuzes verklaren het verschil tussen mijn verwachting en het fondsresultaat". Voor een bredere achtergrond bij de problematiek die deze tool aan de orde stelt, zie ook het publieke LinkedIn-artikel van de auteur: "Communicatie Stichting Shell Pensioenfonds (SSPF) over transitie roept ergernis op" (9 februari 2026), via https://www.linkedin.com/pulse/communicatie-stichting-shell-pensioenfonds-sspf-over-roept-haringa-2yxee. Dit artikel beschrijft het patroon van eenrichtings-communicatie dat de directe aanleiding vormde voor het bouwen van een onafhankelijk reken-instrument.'},{heading:"HOE DE TOOL TOT STAND IS GEKOMEN",body:"Code, modelspecificatie, helpteksten en deze verantwoording zijn iteratief tot stand gekomen in dialoog met meerdere generatieve-AI-assistenten en bronnen: Anthropic Claude (diverse versies, waaronder eerdere generaties Sonnet en Opus en de huidige Claude 4-familie tot en met Opus 4.7) \u2014 primair voor TypeScript-implementatie van rekenkern en UI, modelspecificatie-redactie en architectuurkeuzes; Anthropic Claude Excel-add-in \u2014 voor controleberekeningen in een rekenblad en parallelle handberekeningen; PensioenGPT (custom GPT beschikbaar binnen ChatGPT) \u2014 voor domeinspecifieke navigatie van Pensioenwet, Bijlage 2a en transitieplan-praktijk; Mistral \u2014 voor afstemming en kruiscontrole van interpretaties; diverse browser-gebaseerde AI-assistenten \u2014 voor losse onderzoeksvragen en bronverificatie. Het gebruik van AI-assistenten betekent dat de auteur de wiskundige uitwerking, code en tekst kritisch heeft beoordeeld, maar dat aanwezigheid van fouten \u2014 in interpretatie van de Pensioenwet, in actuari\xEBle formules, in code, of in numerieke uitkomsten \u2014 niet kan worden uitgesloten en op een aantal punten statistisch waarschijnlijk is. Daarbij geldt dat verschillende AI-assistenten op identieke vragen niet altijd identieke antwoorden geven; waar mogelijk is met meerdere bronnen gecontroleerd, maar absolute zekerheid is daarmee niet bereikt. De tool is bewust open-source en transparant; de modelspecificatie en broncode zijn meegeleverd zodat onafhankelijke verificatie mogelijk is. De broncode is publiek beschikbaar via https://github.com/Invaarcalculator/invaarcalculator.git; de tool zelf wordt gehost via GitHub Pages (zie de Privacy-link in de footer voor de implicaties daarvan). De tool is niet beoordeeld door een gecertificeerde actuaris, niet getoetst door SSPF, niet getoetst door DNB, en niet voorzien van een vergunning van de Autoriteit Financi\xEBle Markten (AFM) voor financieel advies. De tool geeft geen persoonlijk financieel advies en is niet bedoeld als grondslag voor financi\xEBle beslissingen."},{heading:"3. HOE ONTSTAAT DE AFWIJKING TUSSEN CALCULATOR EN WERKELIJKHEID?",body:"De afwijking tussen wat deze calculator berekent en wat SSPF voor u individueel zal berekenen, heeft drie hoofdoorzaken die zich op verschillende schermen anders uiten."},{heading:"OORZAAK A \u2014 AANNAMES WAAR PUBLIEKE INFORMATIE ONTBREEKT",body:'Voor onder meer de ervaringssterftefactor, de exacte populatiesamenstelling van het deelnemersbestand, de uitvoering van de bundle-aftrekcascade (de afsplitsingen voorafgaand aan toepassing van de standaardregel) en de eventuele toepassing van een "zachte landing" voor pensioengerechtigden gebruikt de tool plausibele aannames op basis van publieke gegevens. Belangrijkste bronnen: SSPF-transitieplan juli 2024 (Bijlage 8 demografie), Ortec Finance Uitgangspuntendocument Transitierapportage SSPF/SNPS versie 2024.1 (Bijlage B ervaringssterfte), CBS levensverwachting-data, SSPF-implementatieplan juli 2025 en publieke presentatie 14 april 2026. De werkelijke ABTN van SSPF bevat hier specifiekere waarden waar de tool geen toegang toe heeft.'},{heading:"OORZAAK B \u2014 VEREENVOUDIGINGEN TEN OPZICHTE VAN EEN VOLLEDIGE UITVOERINGSPRAKTIJK",body:"Niet gemodelleerd zijn onder andere: stochastische scenario-analyse (goed/mediaan/slecht-weerscenario's), de rendementsdynamiek na invaren met vijfjaars-spreiding van schokken zoals voorzien in de Wtp, de leeftijdsafhankelijke beleggingsmix (lifecycle), de dempingswerking van de risicodelingsreserve (RDR) na invaren, het exacte moment van de invaardatum (1 januari 2027) versus de peildatum van de dekkingsgraad die in de tool wordt gehanteerd, en de zogenoemde 67%-randvoorwaarde uit artikel 150n lid 4 Pensioenwet (Pw) die de toedeling tussen cohorten beperkt."},{heading:"OORZAAK C \u2014 UW EIGEN INPUT",body:"Leeftijd, jaarpensioen, eventueel hoog-laag-bedragen, partner-aanwezigheid en partner-leeftijd vult u zelf in. Als deze afwijken van uw werkelijke Uniform Pensioenoverzicht (UPO) of pensioenadministratie, dan klopt de berekening voor uw werkelijke situatie niet \u2014 ook al doet de tool wiskundig wat hij hoort te doen. Vergelijk uw invoer daarom vooraf met uw UPO."},{heading:"4. IMPLICATIES PER SCHERM EN BRONNEN VAN ONNAUWKEURIGHEID",body:'Onderstaand wordt per uitvoerblok in de calculator aangegeven welke parameters de uitkomst het sterkst be\xEFnvloeden en welke onzekerheidsbronnen actief zijn. Er worden bewust geen harde foutmarges genoemd. Dat zou valse precisie suggereren, want voor de meeste uitkomsten is geen empirische kalibratie tegen werkelijke SSPF-uitkomsten beschikbaar \u2014 die uitkomsten worden immers pas zichtbaar in de individuele transitiebrieven na invaardatum. In plaats daarvan kan de gebruiker zelf de gevoeligheid verkennen: via sliders en invoervelden voor parameters waarbij de gebruiker zelf de waarde kiest (leeftijd, jaarpensioen, partner-aanwezigheid, partner-leeftijd en partnerpensioen, hoog-laag-regeling, rekenrente, en in het tweede pane de cascade-componenten); via de keuzelijst "Spreidingstermijn" in het derde pane (keuze tussen "10 jaar" en "Oneindig"); en via drie knoppen onderaan die een grafische visualisatie tonen ("Verhoging vs. indexatie" voor het tijdspad van uw uitkering; "Effect dekkingsgraad" en "Effect werkgevers-bijdrage" als doorlopen over een parameterbereik), plus een vierde knop "Modelspecificatie" die een PDF-rapport opent met de formele uitwerking van het rekenmodel.'},{heading:"STARTSITUATIE EN RESET",body:'Bij eerste opening van de tool zijn alle parameters ingesteld op de SSPF-standaardwaarden: deelnemer 70 jaar man, jaarpensioen \u20AC 100.000, geen partner; fondsvermogen \u20AC 26.000 mln, dekkingsgraad 136,1%, bijstort \u20AC 500 mln, spreidingstermijn "Oneindig". U vult uw eigen gegevens in het bovenste pane in. De fondsparameters in het pane "Tekort of overschot" staan op de actuele SSPF-waarden. Zodra een fondsparameter afwijkt van de SSPF-standaardwaarde verschijnt in de header van dat pane een "Bewerkt"-label met een Reset-knop, waarmee alle cascade-componenten met \xE9\xE9n klik terug naar de fondsuitgangswaarden gaan. De uitvoerblokken worden hieronder besproken in dezelfde volgorde als zij in de calculator verschijnen.'},{heading:'PANE "UW HUIDIGE PENSIOENAANSPRAAK"',body:"Dit pane bevat de invoervelden voor uw persoonlijke gegevens en toont onderaan de huidige waarde van uw aanspraak, opgebouwd uit ouderdomspensioen en, indien van toepassing, partnerpensioen. Wiskundig is dit het meest robuuste blok: de annu\xEFteits-mechaniek volgt rechtstreeks uit de AG2024-prognosetafel van het Koninklijk Actuarieel Genootschap (KAG) en de gekozen disconteringsvoet. De belangrijkste onzekerheidsbron is de ervaringssterfte-factor (in dit model vlakke f=0,76, gekalibreerd zodat het fonds-totaal annu\xEFteitsbedrag onder onze vlakke f gelijk is aan dat onder Bijlage B van het Ortec Uitgangspuntendocument 2024.1 voor de SSPF-populatie. Bijlage B specificeert de \xE9chte SSPF-ervaringssterfte per leeftijd \xD7 geslacht: voor mannen 15-54 zou f=0,50 zijn, oplopend met de leeftijd naar f=1,0 rond 96; voor vrouwen 15-64 f=0,70, oplopend naar f=1,0 rond 100. Onze vlakke benadering is daarmee voor jongere deelnemers (<50) iets te conservatief en voor de oudste cohorten (>85) iets te aggressief, maar voor de meest gebruikte scenario's (65-75) zit het er dicht op). De tweede onzekerheidsbron is de vlakke rekenrente versus de werkelijke rentetermijnstructuur (RTS) per looptijd zoals gepubliceerd door DNB. Voor een individu met correcte invoer is dit blok robuust in orde-van-grootte; absolute kalibratie tegen SSPF-administratie is niet mogelijk omdat die niet publiek is. De rekenrente is via de slider direct aanpasbaar voor wie de RTS-gevoeligheid wil verkennen."},{heading:'PANE "TEKORT OF OVERSCHOT"',body:"Dit pane toont de cascade waarmee het beschikbare fondsvermogen na afsplitsing van operationele en bestemmingsreserves leidt tot het verdeelbare overschot dat via de standaardregel over deelnemers wordt verdeeld. De dominante onzekerheidsbron is de bundle-aftrekcascade zelf: het transitieplan beschrijft de bestemmingen (operationele reserve, RDR, compensatiedepot), maar niet de exacte allocatiebedragen op invaardatum. De tool gebruikt voor de cascade-componenten de waarden die SSPF in de publieke communicatie noemt (operationele reserve 2%, RDR \u20AC 500 mln, compensatiedepot \u20AC 400 mln), maar deze kunnen op de werkelijke invaardatum (1 januari 2027) afwijken van de stand die nu in de tool is opgenomen. Een tweede onzekerheidsbron is de dekkingsgraad zelf: de tool gebruikt de stand eind februari 2026 (136,1%); de werkelijke invaardekkingsgraad ligt op invaardatum vast. Beide onzekerheden zijn via de sliders in dit pane direct te verkennen; afwijkingen van de fondsstandaardwaarde zijn terug te zetten via de Reset-knop die dan verschijnt."},{heading:'PANE "UW PERSOONLIJK PENSIOENVERMOGEN NA INVAREN"',body:'Dit pane toont in drie gekleurde regels onder elkaar hoe het persoonlijk pensioenvermogen tot stand komt, plus daaronder een regel die het jaarpensioen-equivalent aangeeft. Eerste regel (groen, "Uw huidige pensioenaanspraak"): identiek aan de uitkomst van het eerste pane; herhaald hier als startwaarde. Tweede regel (amber, "Uw aandeel verdeelbaar overschot"): toont wat aan uw huidige aanspraak wordt toegevoegd; per definitie het verschil van twee onzekere getallen, en daarmee relatief het meest gevoelig voor onnauwkeurigheid. Voor kleine verdeelbare overschotten kan een kleine absolute afwijking in \xE9\xE9n van beide invoergetallen een grote relatieve afwijking in het aandeel opleveren. Bij negatief saldo verandert het label naar "Uw aandeel verdeelbaar tekort". Derde regel (rood, "Uw persoonlijk pensioenvermogen", totaal na invaren): erft de onzekerheid van de twee voorgaande regels en voegt \xE9\xE9n modelaanname toe \u2014 de keuze van spreidingstermijn (de tool implementeert de keuze van SSPF voor levenslang via de keuzelijst-optie "Oneindig"). Een aanvullende structurele onzekerheid is de cohort-demografie: de tool gebruikt een voorinstelling "gesloten"; werkelijke SSPF-aantallen zijn niet publiek.'},{heading:"JAARPENSIOEN-EQUIVALENT-REGEL",body:'De regel onder de drie gekleurde regels ("\u2248 + \u20AC X extra ... per jaar pensioen levenslang") erft de onzekerheid van het aandeel verdeelbaar overschot en voegt \xE9\xE9n modelaanname toe: proportionele doorwerking van ouderdomspensioen en partnerpensioen onder de keuze van SSPF voor levenslange spreiding. Onder de wettelijke standaardspreiding van tien jaar zou deze proportionaliteit niet exact gelden (zie helptekst van dit veld en \xA79 van de Modelspecificatie); de keuze van SSPF maakt de aanname robuust binnen de SSPF-context. Het helptekst-icoon naast deze regel bevat verdere uitleg over hoe het partnerpensioen meestijgt bij verhoging van het persoonlijk pensioenvermogen.'},{heading:'KNOP "VERHOGING VS. INDEXATIE" (EERSTE KNOP)',body:'Opent een pedagogische "wat-als"-grafiek. Toont de vlakke "ingevroren" uitkering na invaren versus een hypothetische voortzetting met indexatie. De werkelijke uitkeringspaden onder de Wtp zijn variabel (rendement, levensverwachting, solidariteits- of risicodelingsreserve-werking, lifecycle-mix per cohort) en niet door deze grafiek te voorspellen. Gebruik de grafiek strikt qua richting \u2014 voor het verkrijgen van inzicht in het kruispunt waarboven indexatie de vlakke uitkering inhaalt, niet als kwantitatieve voorspelling.'},{heading:'KNOP "EFFECT DEKKINGSGRAAD" (TWEEDE KNOP)',body:'Toont de gevoeligheid van het persoonlijk pensioenvermogen voor de invaardekkingsgraad over een doorlooptraject. De helling van de curve volgt direct uit de mechaniek van de standaardregel en is wiskundig hard; de absolute uitlees-waarden erven de onzekerheid van "Uw persoonlijk pensioenvermogen". Gebruik primair de helling, niet de absolute waarden.'},{heading:'KNOP "EFFECT WERKGEVERS-BIJDRAGE" (DERDE KNOP)',body:"De bijstort is door de gebruiker zelf in te stellen via slider in het tweede pane (0\u20132500 mln). De grafiek toont correct het effect van die specifieke bijstort op het persoonlijk pensioenvermogen. De staffel uit implementatieplan \xA75.5 (\u20AC 500m bij dekkingsgraad \u2265135%, \u20AC 650m bij 130\u2013135%, \u20AC 850m bij 125\u2013130%) is bewust niet automatisch gekoppeld aan de dekkingsgraad-slider \u2014 de gebruiker stelt zelf de combinatie dekkingsgraad/bijstort in die hij/zij wil modelleren. Bij correcte handmatige invoer is de grafiek zowel qua richting als kwantitatief informatief."},{heading:'KNOP "MODELSPECIFICATIE" (VIERDE KNOP)',body:"Opent een PDF met de formele uitwerking van wat de calculator doet \u2014 niet wat SSPF doet. Heeft zelf geen bandbreedte; geeft daarentegen de gebruiker (of een derde \u2014 actuaris, lid van het verantwoordingsorgaan, journalist) de mogelijkheid om de implementatie regel voor regel te toetsen."},{heading:"ONAFHANKELIJKE VERIFICATIE VIA ABN AMRO PENSIOENFONDS",body:`Een concreet referentiepunt voor de plausibiliteit van de calculator-uitkomsten is de vergelijking met publieke deelnemerscommunicatie van ABN AMRO Pensioenfonds (hierna: ABN). ABN heeft in zijn transitieplan (17 oktober 2024) en implementatieplan (22 september 2025) per leeftijdscohort en dekkingsgraad een transparant overzicht van invaareffecten gepubliceerd; deze cijfers zijn tevens opgenomen in de uitspraak van het College voor de Rechten van de Mens d.d. 4 maart 2026 (oordeelnummer 2026-34). ABN hanteert de wettelijke standaardspreidingstermijn van tien jaar. Onderstaande twee tabellen tonen voor pensioengerechtigden bij invaardekkingsgraad 135% de procentuele verhoging van het persoonlijk pensioenvermogen op transitiedatum, berekend met de productie-rekenkern van deze calculator (versie ${t}). Tabel A vergelijkt een scenario zonder partner met de publieke cohort-cijfers van ABN; Tabel B toont dezelfde berekening met partner volgens de SSPF-standaardwaarden.`},{heading:"TABEL A \u2014 ZONDER PARTNER (VERGELIJKBAAR MET ABN-PUBLIEKE COHORT-CIJFERS)",tableHeaders:["Leeftijd","ABN spreiding 10 jaar (publiek)","SSPF spreiding 10 jaar (rekenkern)","SSPF spreiding oneindig (rekenkern, keuze SSPF)","\u0394 10 \u2192 oneindig"],tableRows:[["65 jaar","24%","+27,7%","+22,9%","\u22124,8 pp"],["75 jaar","20%","+22,8%","+15,3%","\u22127,5 pp"],["85 jaar","17%","+14,6%","+8,5%","\u22126,1 pp"],["95 jaar","12%","+7,0%","+4,0%","\u22123,1 pp"]]},{heading:"TABEL B \u2014 MET PARTNER (VROUW 3J JONGER, PARTNERPENSIOEN \u20AC 70.000)",tableHeaders:["Leeftijd","Partner","SSPF spreiding 10 jaar (rekenkern)","SSPF spreiding oneindig (rekenkern, keuze SSPF)","\u0394 10 \u2192 oneindig"],tableRows:[["65 jaar","62V","+29,1%","+26,4%","\u22122,8 pp"],["75 jaar","72V","+25,5%","+18,6%","\u22126,9 pp"],["85 jaar","82V","+18,4%","+11,2%","\u22127,2 pp"],["95 jaar","92V","+9,9%","+5,6%","\u22124,3 pp"]]},{heading:"DRIE OBSERVATIES BIJ DEZE CIJFERS \u2014 LEERZAME WAARDE VAN DE TOOL",body:"Eerste observatie: in de vergelijking zonder partner (Tabel A) komt de SSPF-rekenkern voor de jongere pensioencohorten hoger uit dan ABN (+3,7 pp bij 65 jaar, +2,8 pp bij 75 jaar) en voor de oudere cohorten lager (\u22122,4 pp bij 85 jaar, \u22125,0 pp bij 95 jaar). Dat afwijkende patroon \u2014 geen uniforme over- of onderschatting, met een omslag rond 80 jaar \u2014 is verklaarbaar door fondsspecifieke parameters waarop SSPF en ABN substantieel verschillen: SSPF heeft een kleinere bundle-aftrek (cascade-gewogen 6,71% versus de door ABN gerapporteerde circa 10%) plus een transitiebijdrage van \u20AC 500 mln die ABN niet kent in deze vorm. Voor oudere cohorten domineren demografie en spreidingsmechaniek. Tweede observatie: in Tabel A is het effect van spreiding 10 jaar \u2192 spreiding oneindig voor elk cohort negatief en leeftijdsafhankelijk van omvang: \u22124,8 pp bij 65 jaar, oplopend tot het grootste nadeel rond 75 jaar (\u22127,5 pp), daarna afnemend naar \u22126,1 pp bij 85 jaar en \u22123,1 pp bij 95 jaar. Het zwaartepunt van het nadeel ligt bij de cohorten waar de SSPF-pensioenverplichting concentreert (75\u201385 jarigen). Derde observatie: het patroon blijft overeind wanneer een partner wordt meegerekend (Tabel B). Ook met een partner (vrouw, drie jaar jonger, partnerpensioen \u20AC 70.000) is de opslag onder spreiding oneindig voor elk getoond cohort lager dan onder spreiding tien jaar \u2014 van \u22122,8 pp bij 65 jaar tot \u22127,2 pp bij 85 jaar. De aanwezigheid van een jongere partner verlengt weliswaar de gewogen kasstroomhorizon, maar onder de huidige ervaringssterfte-grondslag (Bijlage B) is dat effect niet groot genoeg om het teken voor enig cohort te doen omslaan. De conclusie is dus eenduidiger dan een eerdere versie van deze tabel (onder de vlakke sterfte-kalibratie van v\u22643.0) suggereerde: de keuze voor levenslange spreiding pakt voor alle getoonde pensioengerechtigden-cohorten ongunstiger uit dan de wettelijke tien-jaarstermijn, met of zonder partner; de omvang van dat nadeel is wel leeftijdsafhankelijk en het grootst voor de 75\u201385-jarigen."},{heading:"TOT SLOT BIJ DEZE VERGELIJKING",body:"Het feit dat ABN een dergelijke transparante cohort-tabel \xFCberhaupt publiek heeft gemaakt, terwijl SSPF cohort-specifieke doorrekeningen niet beschikbaar stelt aan zijn deelnemers, raakt de kern van het probleem dat deze tool aan de orde stelt. Een fondsdeelnemer bij ABN kan zonder hulpmiddelen zien wat hij of zij ongeveer kan verwachten; een SSPF-deelnemer is voor diezelfde informatie aangewezen op een onafhankelijke reconstructie zoals deze calculator."},{heading:"5. WAT U WEL UIT DEZE TOOL KUNT HALEN",body:"Ondanks de in \xA73 en \xA74 benoemde beperkingen biedt de tool naar de mening van de auteur drie soorten waarde. Eerste waarde \u2014 begrip van de mechaniek: de tool toont wat de standaardregel uit Bijlage 2a Regeling Pensioenwet doet, welke parameters daarin een rol spelen, en hoe dekkingsgraad, transitiebijdrage en spreidingstermijn op elkaar inwerken. Een SSPF-deelnemer die anders alleen een eindbedrag in een transitiebrief zou zien, kan met deze tool zelfstandig nagaan welke stappen dat eindbedrag opbouwen. Tweede waarde \u2014 gevoeligheidsbesef: de drie visualisatie-knoppen, in combinatie met de sliders in de drie panes, laten zien aan welke parameters de uitkomst gevoelig is en aan welke niet. Derde waarde \u2014 gespreksvoorbereiding: met een richtindicatie van de orde van grootte kan de gebruiker het gesprek aangaan met SSPF, met collega's, in het verantwoordingsorgaan, in de ALV van Voeks of een andere belangenvereniging, of in correspondentie met DNB. De tool helpt om gerichte vragen te formuleren over de keuzes die SSPF in het transitie- en implementatieplan heeft gemaakt \u2014 niet om die keuzes te bestrijden zonder feitelijke basis, maar om ze toetsbaar te maken. Bij elk van deze drie soorten waarde geldt dat de tool een hulpmiddel is om vragen scherper te stellen, niet om ze definitief te beantwoorden."},{heading:"6. WAT U EXPLICIET NIET UIT DEZE TOOL KUNT HALEN",body:`De tool is niet ontworpen voor andere pensioenfondsen dan SSPF. Binnen de SSPF-context geldt het volgende. De tool geeft geen voorspelling van uw werkelijke pensioenuitkering per maand of jaar na invaren \u2014 die wordt bepaald door SSPF op basis van de definitieve invaardekkingsgraad, de werkelijke fondsbalans op invaardatum, en uw individuele aanspraak zoals geregistreerd in de pensioenadministratie. Evenmin levert de tool een voorspelling over het verloop van uw pensioen in de tijd. Voor een bezwaarprocedure biedt de tool geen onderbouwing: onder de Wtp is een individueel bezwaarrecht tegen invaren wettelijk niet voorzien; de besluitvorming is collectief via sociale partners en het fondsbestuur, met toetsing door DNB op evenwichtigheid voor groepen, niet voor individuen. Wel kan de tool dienen als rekenkundige onderbouwing voor een zienswijze richting DNB of een vraag aan het fondsbestuur. Een grondslag voor financi\xEBle planning of individuele beslissingen omtrent eerder stoppen met werken, partnerverlof, aanvullende verzekeringen of fiscale optimalisatie wordt evenmin geboden. Voor dat soort beslissingen zijn de transitiebrief van SSPF, persoonlijk financieel advies van een gecertificeerd adviseur, en (waar relevant) overleg met uw werkgever of een belastingadviseur de juiste bronnen. Niet inbegrepen is informatie over de evenwichtigheidstoets die SSPF tussen verschillende cohorten heeft uitgevoerd. Die toets vereist toegang tot transitiematen (netto profijt per cohort, pensioenverwachting in goed-mediaan-slechtweer-scenario's, gemiddelde kortingskans over 15 jaar) die in het implementatieplan zijn opgenomen voor de SSPF-gekozen spreiding maar niet vergelijkend zijn doorgerekend voor andere parameterkeuzes \u2014 een aspect dat in de zienswijze aan DNB van 2 mei 2026 uitdrukkelijk wordt gevraagd. Tot slot ontbreekt informatie over fondskeuzes die buiten de standaardregel vallen, zoals de zogenoemde "zachte landing" of egalisatie-correctie binnen het cohort gepensioneerden, de exacte toepassing van de 67%-randvoorwaarde uit artikel 150n lid 4 Pensioenwet, en de wijze waarop de RDR na invaren wordt aangewend ter demping van kortingen.`},{heading:"7. BRONNEN EN VERSIES",body:'Wet- en regelgeving: de Wtp (Staatsblad 2023, 217), de Pensioenwet zoals gewijzigd door de Wtp, het Besluit uitvoering Pensioenwet en Wet verplichte beroepspensioenregeling (specifiek artikel 46 lid 2), de Regeling Pensioenwet en Wet verplichte beroepspensioenregeling met name Bijlage 2a (de "standaardregel"; laatstelijk gewijzigd Staatscourant 2025, 15094), en de Q&A "Onderbouwing spreidingstermijn standaardregel" gepubliceerd door DNB op 23 juni 2025. Toezichts- en sectordocumenten: de DNB-factsheet "Omrekenmethoden en aanwenden vermogen pensioenfonds bij invaren", het servicedocument van de Pensioenfederatie over nabestaandenpensioen onder de Wtp, en de KAG-prognosetafels AG2024 (publicatie 12 september 2024). SSPF-specifieke documenten: het transitieplan, het op 15 juli 2025 vastgestelde Wtp-implementatieplan SSPF, de SSPF-presentatie van 14 april 2026, en het SSPF-jaarverslag 2024. Niet-publieke documenten waar SSPF wel over beschikt en die de tool niet kan benutten: de ABTN, de individuele pensioenadministratie per deelnemer, en de cohort-specifieke transitiematen. Vergelijkende bronnen: het ABN AMRO Pensioenfonds-transitieplan van 17 oktober 2024, het ABN AMRO Pensioenfonds-implementatieplan van 22 september 2025, en de uitspraak van het College voor de Rechten van de Mens van 4 maart 2026 (oordeelnummer 2026-34). Analyses en commentaar: Willis Towers Watson, "Uiteenlopende invullingen van de eerbiediging van partnerpensioen" in Pensioen Update (februari 2025); Ortec Finance, "De standaardmethode voor invaren wordt de norm" en "Spreidingsperiode bij toepassing standaardmethode"; diverse publieke transitie-communicaties van Nederlandse pensioenfondsen (Pensioenfonds Zorg en Welzijn, PMT, bpfBOUW, PME, ABP en andere) ten behoeve van vergelijking. Versies en peildatums: de calculator-versie en de bouwdatum staan onderaan elk scherm. De rekenkern krijgt een nieuwe versie bij elke wijziging; de modelspecificatie (toegankelijk via de knop "Modelspecificatie") volgt dezelfde versionering. De ingebedde modelspecificatie-PDF wordt periodiek bijgewerkt en kan tijdelijk een versie achterlopen op de UI. De peildatum voor SSPF-fondsgegevens (dekkingsgraad 136,1%, fondsvermogen \u20AC 26.000 mln) is eind februari 2026. De werkelijke invaardatum is per 1 januari 2027; de calculator-uitkomsten zijn een momentopname die op invaardatum afwijkt naarmate de dekkingsgraad of fondsbalans zich in de tussentijd anders ontwikkelt.'},{heading:"8. CONTACT EN FEEDBACK",body:"Voor inhoudelijke opmerkingen, ontdekte fouten of suggesties voor verbetering kunt u contact opnemen via het e-mailadres in de footer van deze tool. De auteur waardeert correcties, parameter-bronverwijzingen en gevoeligheidsanalyses die de tool verder kunnen verbeteren, en stelt updates van de tool in het vooruitzicht zodra significante nieuwe publieke informatie beschikbaar komt \u2014 bijvoorbeeld na de DNB-uitspraak over de SSPF-invaarmelding, of na publicatie van de individuele transitiebrieven aan SSPF-deelnemers per 1 januari 2027. Voor uw eigen pensioenvragen, vragen over uw werkelijke aanspraak, of bezwaren tegen onderdelen van uw transitie verwijst de auteur naar SSPF, via de kanalen die het fonds zelf aanwijst. Deze tool is geen vervanging van SSPF-communicatie en biedt geen mogelijkheid om individuele dossiers te behandelen. De drie documenten en het LinkedIn-artikel zoals genoemd in \xA72 zijn opvraagbaar via hetzelfde e-mailadres."}]}),vi=({releaseVersion:t,buildDate:e})=>({title:"Release",sections:[{heading:"",body:`U gebruikt de Invaarcalculator versie ${t}, gebouwd op ${e}. Bij elke wijziging aan de rekentool of de teksten verschijnt een nieuw versienummer; zo is altijd te herleiden welke uitvoering u voor zich heeft. Vermeld dit versienummer als u contact opneemt over een berekening.`}]}),hi=({bandSnapshot:t})=>{let e=U.shortLabel??"het fonds",n="De Invaarcalculator\xAE",a=l=>"\u20AC "+Math.round(Math.abs(l)).toLocaleString("nl-NL"),i=l=>(l<0?"\u2212":"+")+(Math.abs(l)*100).toLocaleString("nl-NL",{minimumFractionDigits:1,maximumFractionDigits:1})+"%",r="De aanpassing van uw pensioen na

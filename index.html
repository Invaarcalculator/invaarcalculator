<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invaarcalculator® · Voor wie SSPF-pensioen ontvangt na de AOW-leeftijd</title>
<style>
  /* ─── Reset ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  button { font: inherit; color: inherit; }

  /* ─── Design tokens (overgenomen uit invaarcalculator.nl 21-04-2026) ── */
  :root {
    --bg:    #f4f4f2;
    --card:  #fff;
    --surf:  #f0efed;
    --txt1:  #1a1a1a;
    /* v3.0.166: --txt2 #6b7280 → #5a6473 voor WCAG AA contrast (≥4.5:1)
       op zowel witte als licht-grijze achtergronden (display-deepdive,
       cohort-tabellen). Effectief contrast ~7:1 op wit, ~6,7:1 op
       rgba(0,0,0,0.025). Visueel nog steeds duidelijk secundair t.o.v.
       --txt1. */
    --txt2:  #5a6473;
    --bdr:   rgba(0,0,0,0.10);
    --bdr2:  rgba(0,0,0,0.18);
    --red:   #D4001A;
    --blue:  #1a6db5;
    --green: #1a8a45;
    --amber: #C07A00;
    --r6:  6px;
    --r8:  8px;
    --r12: 12px;
    /* v3.0.91: numerieke font-size tokens — 3-laags schaal voor alle getal-
       renderingen in de UI. Vervangt 9-tal verschillende sizes (10/11/12/13/
       15/18/22/26-mobile/32). Type-ratio 28/16/12 = 1,75× / 1,33×.
         --num-l : anker-waarden (M1 KV, M2 ppkTotal) — gelijk-prominent
         --num-m : sub-aggregaten (formule-componenten, KV-decompositie, cascade-totaal)
         --num-s : detail (cascade-rijen, tabel-cellen, footer, mod-tags, slider-markers) */
    --num-l: 28px;
    --num-m: 16px;
    --num-s: 12px;
  }

  /* ─── Base ──────────────────────────────────────────────────── */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: var(--txt1);
    background: var(--bg);
    min-height: 100vh;
    padding: 24px 16px 48px;
    line-height: 1.45;
  }
  .wrap, body > .topline, body > #app, body > footer {
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  body > .topline h1,
  body > h1 {
    font-size: 18px;
    font-weight: 600;
  }
  body > h1 { margin-bottom: 14px; }

  /* v3.0.179 (basic UI-design): topline en footer altijd zichtbaar, pane
     scrollt in het middendeel. Alleen voor basic-variant (body.variant-basic).
     Expert behoudt de normale flowing layout.

     Implementatie: body = flex column op viewport-hoogte. Topline en
     footer (beide statische body-children, footer in HTML-template) zijn
     flex: 0 0 auto. Het middendeel #app krijgt flex: 1 1 auto +
     overflow-y: auto en is dus de scroll-container. */
  body.variant-basic {
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-height: 100vh;
    padding: 24px 16px 12px;
    overflow: hidden;
  }
  body.variant-basic > .topline,
  body.variant-basic > .site-footer-mount {
    flex: 0 0 auto;
    /* v3.0.180: zelfde align-self/width-truc als #app om centrering te
       garanderen in flex-column context. max-width van 960px komt uit
       de generieke regel; align-self + width 100% zorgen dat ze écht
       op die positie staan. */
    align-self: center;
    width: 100%;
  }
  body.variant-basic > .site-footer-mount {
    /* In de fixed-layout heeft de footer geen aparte margin nodig;
       hij staat al in z'n eigen flex-cell aan de bodem. */
    margin-top: 8px;
    padding-top: 8px;
  }
  body.variant-basic > #app {
    flex: 1 1 auto;
    overflow-y: auto;
    min-height: 0; /* essentieel voor flex-overflow op kinderen */
    /* v3.0.180: align-self overschrijft de flex-default 'stretch' die
       max-width + margin:auto onbruikbaar maakt op flex-children. Met
       expliciete align-self respecteert de browser de max-width van
       960px en kan de margin:auto echt centreren. Zonder deze regel
       loopt #app over de hele viewport-breedte heen, terwijl de topline
       wel netjes gecentreerd staat (eruit ziet als visueel verschil). */
    align-self: center;
    width: 100%;
  }
  /* v3.0.188 (basic-UX): Uitleg-knop in topline verbergen voor basic.
     De inhoud is niet meer in lijn met wat basic doet (wizard-stap-
     uitleg per pane is voldoende). Knop blijft beschikbaar in expert.
     Gebruikt !important om de generieke topline-btn-stack regel
     verderop in deze CSS-string te overrulen zonder de bron-volgorde
     te moeten omdraaien. */
  body.variant-basic .topline-btn-stack {
    display: none !important;
  }

  h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--txt1);
  }
  h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--txt1);
    margin-top: 14px;
    margin-bottom: 8px;
  }
  p { font-size: 13px; color: var(--txt2); line-height: 1.55; }
  a { color: var(--blue); }

  /* ─── View-toggle (zichtbaar wanneer audit unlocked) ────────── */
  .view-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .view-toggle button {
    flex: 1;
    padding: 8px 14px;
    border: 0.5px solid var(--bdr2);
    background: var(--card);
    cursor: pointer;
    border-radius: var(--r8);
    font-size: 13px;
    color: var(--txt1);
  }
  .view-toggle button.active {
    background: var(--txt1);
    color: #fff;
    border-color: var(--txt1);
  }

  /* ─── Pane = Card ───────────────────────────────────────────── */
  .pane {
    background: var(--card);
    border: 0.5px solid var(--bdr);
    border-radius: var(--r12);
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .pane.casual.pane-m1 { border-left: 3px solid var(--green); }
  .pane.casual.pane-m2 { border-left: 3px solid var(--red); }
  .pane.casual.pane-m12 { border-left: 3px solid var(--amber); }
  .pane.audit          { border-left: 3px solid var(--amber); }

  /* v3.0.181 (basic-UX stap 3 — wizard): pane-wizard zijn de stap-panes
     in basic. Veldwiel anders dan expert: hier zijn velden full-width
     met label boven, niet de tabel-stijl van de expert-pane.
     Wizard-nav onderaan met Vorige/Volgende-knoppen op tegenoverliggende
     zijden. */
  .pane-wizard {
    border-left: 3px solid var(--green);
  }
  /* v3.0.213: rode lijn voor netto-route — visueel signaal dat de
     gebruiker op een schatting-pad zit. Geldt voor alle pane-wizard
     wrappers vanaf het moment dat upoRoute='netto' is gekozen. */
  .pane-wizard.pane-wizard-warning {
    border-left-color: var(--red);
  }
  .pane-wizard h2 {
    margin-top: 0;
    margin-bottom: 16px;
  }
  .pane-wizard p {
    margin: 0 0 16px 0;
    line-height: 1.5;
    color: var(--txt1);
  }
  .wizard-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .wizard-field:last-child {
    margin-bottom: 8px;
  }
  .wizard-field label {
    font-size: 13px;
    color: var(--txt2);
    font-weight: 500;
  }
  .wizard-field input[type="date"],
  .wizard-field input[type="number"],
  .wizard-field input[type="text"],
  .wizard-field select,
  .pen-input-number {
    width: 100%;
    box-sizing: border-box;
    padding: 0 12px;
    font-size: 16px;
    font-family: inherit;
    border: 1px solid var(--bdr);
    border-radius: 4px;
    background: var(--bg-input, white);
    color: var(--txt1);
    /* v3.0.217: expliciete height voor consistente rendering tussen
       <input> en <select>. Zonder dit rendert Safari/Chrome een select
       merkbaar hoger of lager dan een input met identieke padding —
       internal padding van de native dropdown-arrow wijkt af. 40px =
       16px font + ruimte voor descenders + border. */
    height: 40px;
    line-height: 1.4;
  }
  /* v3.0.183: read-only veld voor partner-NP = 70%-mededeling in
     netto-route. Toont een "value" zonder echte input. */
  .wizard-field-readonly .readonly-waarde {
    padding: 0 12px;
    font-size: 15px;
    color: var(--txt1);
    background: rgba(0, 0, 0, 0.03);
    border: 1px solid var(--bdr);
    border-radius: 4px;
    font-style: italic;
    height: 40px;
    line-height: 40px;
    box-sizing: border-box;
  }
  /* v3.0.183: financieel-pane bron-uitleg (alleen netto-route). */
  .financieel-bron {
    margin-top: 16px !important;
    padding: 10px 12px;
    background: rgba(184, 110, 0, 0.06);
    border-left: 3px solid var(--amber);
    font-size: 12px;
    line-height: 1.45;
    color: var(--txt1);
  }

  /* v3.0.186 (basic-UX): hoog-laag-detail-velden krijgen visuele
     groepering (inspring + accent-lijntje links) zodat de gebruiker
     ziet dat ze sub-velden zijn onder de toggle. */
  .wizard-field-hooglaag-detail {
    padding-left: 12px;
    border-left: 2px solid var(--bdr);
    margin-left: 4px;
  }

  /* v3.0.184 (basic-UX): resultaat-pane drie-regelige KPI in twee
     kolommen (per maand / per jaar). Verschil-rij visueel onderscheiden,
     positief/negatief in groen/rood. */
  .resultaat-tabel {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
    margin-bottom: 16px;
  }
  .resultaat-tabel th,
  .resultaat-tabel td {
    padding: 10px 12px;
    text-align: right;
    font-size: 16px;
    vertical-align: middle;
  }
  .resultaat-tabel thead th {
    font-size: 12px;
    font-weight: 500;
    color: var(--txt2);
    text-transform: lowercase;
    border-bottom: 0.5px solid var(--bdr);
  }
  .resultaat-tabel tbody th {
    text-align: left;
    font-weight: 500;
    color: var(--txt2);
    font-size: 14px;
  }
  .resultaat-tabel tbody td {
    color: var(--txt1);
    font-variant-numeric: tabular-nums;
  }
  .resultaat-row-nu td {
    color: var(--txt2);
  }
  .resultaat-row-na td {
    color: var(--txt1);
    font-weight: 500;
  }
  /* v3.0.196: schatting-variant voor netto-route. Maakt zowel Nu als Na
     invaren in zachter grijs (var(--txt2)) i.p.v. de UPO-route waar
     Na invaren in donker zwart staat. Verschil-rij blijft groen/rood —
     de procentuele verandering is route-onafhankelijk en hoeft niet
     "geschat" te lijken. */
  .resultaat-tabel-schatting .resultaat-row-na td {
    color: var(--txt2);
  }
  /* v3.0.203: border-top op Verschil-rij voor visuele separator van de
     Na-rij. Padding is uniform (10px alle kanten) zodat alle rijen even
     hoog zijn en de inhoud netjes vertikaal gecentreerd staat.
     v3.0.205: ook Procentueel-rij krijgt uniforme padding (was eerder
     padding-top: 0 om aan Verschil te plakken). Vier rijen even hoog
     leest schoner dan het plak-effect. */
  .resultaat-row-verschil {
    border-top: 0.5px solid var(--bdr);
  }
  .resultaat-row-verschil th,
  .resultaat-row-verschil td {
    font-weight: 500;
  }
  .resultaat-row-verschil.verschil-positief td {
    color: var(--green);
  }
  .resultaat-row-verschil.verschil-negatief td {
    color: var(--red);
  }
  .resultaat-row-procentueel th,
  .resultaat-row-procentueel td {
    font-weight: 500;
  }
  .resultaat-row-procentueel.verschil-positief td {
    color: var(--green);
  }
  .resultaat-row-procentueel.verschil-negatief td {
    color: var(--red);
  }
  /* v3.0.215: bij netto-route (warning-modifier op pane) ook de groene
     "+" cijfers in rood weergeven — consistent met de rode lijn links
     van de pane en de rode subtitel. De +/− tekens blijven de richting
     aanduiden. Specificiteit (0,3,1) overschrijft de generieke (0,2,1)
     groen/rood regels. */
  .pane-wizard.pane-wizard-warning .resultaat-row-verschil td,
  .pane-wizard.pane-wizard-warning .resultaat-row-procentueel td {
    color: var(--red);
  }
  /* v3.0.202: subtitel onder h2 op resultaat-pane met route-info.
     v3.0.203: modifier '-warning' voor netto-route in rood, signaal
     dat het een benadering is en geen exacte berekening.
     v3.0.204: selector aangescherpt met .pane-wizard prefix om
     .pane-wizard p { color: var(--txt1) } te overrulen — anders won
     die de specificiteits-strijd en bleef de subtitel in default-tekst-
     kleur staan i.p.v. grijs/rood. */
  .pane-wizard .resultaat-subtitel {
    margin-top: -4px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--txt2);
    line-height: 1.4;
  }
  .pane-wizard .resultaat-subtitel-warning {
    color: var(--red);
    font-weight: 500;
  }
  /* v3.0.210: dropdown voor DG-keuze, boven de tabel. Inline-flex zodat
     label en select naast elkaar staan; mild grijze label-tekst om geen
     concurrentie te vormen met de h2 erboven of de tabel eronder.
     v3.0.214: select-stijl expliciet binnen .resultaat-dg-keuze om de
     full-width van '.wizard-field select' te overrulen — compact, font-
     size in lijn met label (13px), padding klein. */
  .pane-wizard .resultaat-dg-keuze {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 12px 0;
    font-size: 13px;
    color: var(--txt2);
  }
  .pane-wizard .resultaat-dg-keuze label {
    font-weight: 500;
    margin: 0;
  }
  .pane-wizard .resultaat-dg-keuze select {
    font-family: inherit;
    font-size: 13px;
    color: var(--txt1);
    padding: 4px 8px;
    border: 1px solid var(--bdr);
    border-radius: 4px;
    background: var(--card, white);
    cursor: pointer;
    width: auto;
    margin: 0;
  }
  /* v3.0.207: algemene disclaimer onder de tabel — geldt voor beide
     routes. Maakt duidelijk dat dit een indicatie is en het fonds
     uiteindelijk de officiële berekening doet. Subtieler grijs dan
     de subtitel, kleinere font. */
  .pane-wizard .resultaat-disclaimer {
    margin-top: 12px;
    font-size: 12px;
    color: var(--txt2);
    line-height: 1.4;
  }
  .resultaat-bron {
    margin-top: 12px !important;
    font-size: 12px !important;
    line-height: 1.45 !important;
    color: var(--txt2) !important;
  }
  .resultaat-bron-netto {
    padding: 8px 10px;
    background: rgba(184, 110, 0, 0.06);
    border-left: 3px solid var(--amber);
    color: var(--txt1) !important;
  }
  .resultaat-leeg,
  .resultaat-fout {
    padding: 14px;
    background: rgba(0, 0, 0, 0.03);
    border-radius: 4px;
    color: var(--txt2) !important;
    font-style: italic;
  }
  .resultaat-fout {
    background: rgba(220, 60, 60, 0.06);
    color: var(--red) !important;
  }

  .wizard-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid var(--bdr);
  }
  /* v3.0.181: wizard-knoppen (Volgende, Bereken, Vorige). action-btn is
     de generieke primary stijl; -secondary voor de gentle Vorige-knop.
     v3.0.185: disabled-state voor Bereken-knop wanneer vereiste velden
     niet ingevuld. */
  .wizard-nav .action-btn {
    background: var(--green);
    color: white;
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 9px 18px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .wizard-nav .action-btn:hover:not(:disabled) {
    filter: brightness(0.92);
  }
  .wizard-nav .action-btn:disabled {
    background: var(--bdr);
    border-color: var(--bdr);
    color: var(--txt2);
    cursor: not-allowed;
  }
  /* v3.0.182: drie dropdowns naast elkaar voor geboortedatum. Verhouding
     ~ smaller / medium / breder voor dag / maand / jaar (maand-naam is
     langer dan getal). Op smalle schermen wrappen ze keurig. */
  .dob-dropdowns {
    display: grid;
    grid-template-columns: 0.7fr 1.3fr 1fr;
    gap: 8px;
  }
  .dob-dropdowns select {
    width: 100%;
    box-sizing: border-box;
    padding: 0 12px;
    font-size: 16px;
    font-family: inherit;
    border: 1px solid var(--bdr);
    border-radius: 4px;
    background: var(--bg-input, white);
    color: var(--txt1);
    /* v3.0.217: zelfde height als wizard-field inputs/selects voor
       consistente rendering. */
    height: 40px;
    line-height: 1.4;
  }
  /* v3.0.188-191: .dob-caption verwijderd. Leeftijd/sterfleeftijd
     komen niet meer op invoer-panes; later in een aparte "Details"-pane. */
  .action-btn-secondary {
    background: var(--bg-input, white);
    color: var(--txt1);
    border: 1px solid var(--bdr);
  }
  .action-btn-secondary:hover {
    background: rgba(0, 0, 0, 0.03);
  }

  /* v3.0.176 (fase 2 stap 2 — basic-UX): triage-pane + niet-geschikt-pane.
     Triage-pane heeft een neutrale (grijze) accent-rand; niet-geschikt
     krijgt een amber-rand om de "let op"-signatuur visueel duidelijk te
     maken.
     v3.0.177: triage vereenvoudigd naar één ja/nee-bevestiging; criteria
     in een korte bullet-lijst. Strip-CSS verwijderd (strip weg). */
  .pane.casual.pane-triage {
    border-left: 3px solid var(--txt2);
  }
  .pane.casual.pane-niet-geschikt {
    border-left: 3px solid var(--amber);
  }
  .triage-criteria {
    margin: 0 0 16px 0;
    padding-left: 22px;
    line-height: 1.6;
    color: var(--txt1);
  }
  .triage-criteria li {
    margin-bottom: 4px;
  }
  .triage-opties {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .triage-optie {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--bdr);
    border-radius: 6px;
    cursor: pointer;
    background: var(--bg-input, white);
  }
  .triage-optie:hover {
    border-color: var(--green);
    background: rgba(0, 128, 0, 0.04);
  }
  .triage-optie input[type="radio"] {
    width: 18px;
    height: 18px;
    margin-top: 2px;
    cursor: pointer;
  }
  .triage-optie-titel {
    font-weight: 600;
    color: var(--txt1);
    display: block;
  }
  /* v3.0.191: wrapper voor titel+subtitel zodat ze in een kolom vallen
     naast het radio-bolletje (niet als losse flex-items). */
  .triage-optie-tekst {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  /* v3.0.191: subtitel onder triage-optie-titel voor korte uitleg
     per optie. Beide blok-elementen vormen samen de tekst-kolom naast
     het radio-bolletje. */
  .triage-optie-subtitel {
    display: block;
    margin-top: 4px;
    font-size: 13px;
    font-weight: 400;
    color: var(--txt2);
    line-height: 1.4;
  }
  .pane-niet-geschikt p {
    margin: 0 0 12px 0;
    line-height: 1.5;
  }
  .pane-niet-geschikt ul {
    margin: 0 0 16px 0;
    padding-left: 20px;
    line-height: 1.6;
  }
  .pane-niet-geschikt a {
    color: var(--green);
    text-decoration: underline;
  }

  /* v3.0.79: M1/2-pane "Wat is er te verdelen?" — cascade-tabel met inline
     sliders, afwijking-markers, reset-knop. */
  /* v3.0.169–170: pane-m12 en pane-m2 standaard ingeklapt via
     <details>/<summary>; aparte classes per pane. */
  /* v3.0.171: collapsible-patroon gegeneraliseerd. Eén gedeelde class
     '.pane-collapsible' op het <details>-element vervangt de eerdere
     pane-specifieke namen (.m12-details / .m2-details). Wordt nu ook
     toegepast op pane-actions (Scenario's) en pane-documenten. Summary
     draagt de h2 (heading-semantiek behouden) + chevron-indicator die 90°
     draait bij open. */
  .pane-collapsible > summary {
    list-style: none;          /* Firefox/standaard marker uit */
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 0;
    /* H2 binnen summary draagt eigen margin-bottom; summary zelf geen extra. */
  }
  .pane-collapsible > summary::-webkit-details-marker {
    display: none;             /* Safari/oude WebKit marker uit */
  }
  .pane-collapsible > summary::before {
    content: "▸";
    display: inline-block;
    font-size: 11px;
    color: var(--txt2);
    margin-right: 8px;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }
  .pane-collapsible[open] > summary::before {
    transform: rotate(90deg);
  }
  .pane-collapsible > summary > h2 {
    margin: 0;                 /* h2's eigen margin-bottom uit; inhoud
                                  daaronder heeft eigen spacing. */
    display: inline-block;
  }
  .pane-collapsible[open] > summary {
    margin-bottom: 12px;       /* lucht naar inhoud als geopend */
  }
  .pane-m12 .m12-intro {
    color: var(--txt2);
    font-size: 12px;
    line-height: 1.4;
    margin: 0 0 12px 0;
  }
  .cascade-table {
    display: flex;
    flex-direction: column;
    gap: 10px;
    /* v3.0.115: margin-bottom: 14px verwijderd — niks onder cascade-table
       in pane-m12, pane-padding alleen al geeft genoeg lucht naar de bottom. */
  }
  .cascade-row {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 4px 12px;
    align-items: baseline;
    padding-bottom: 8px;
    border-bottom: 0.5px dashed var(--bdr);
  }
  .cascade-row .cascade-label {
    grid-column: 1;
    grid-row: 1;
    font-size: 12px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .cascade-row .cascade-val {
    grid-column: 2;
    grid-row: 1;
    text-align: right;
    font-size: var(--num-s);
  }
  .cascade-row .cascade-slider {
    grid-column: 1 / span 2;
    grid-row: 2;
    width: 100%;
  }
  /* v3.0.84: begin/eind-waardes onder cascade-sliders */
  .cascade-row .cascade-markers {
    grid-column: 1 / span 2;
    grid-row: 3;
    display: flex;
    justify-content: space-between;
    font-size: var(--num-s);
    color: var(--txt2);
    margin-top: 2px;
  }
  /* v3.0.84: cascade-context rij (DG) — geen plus/minus, contextuele
     parameter; visueel wat gedempter dan input-rij. */
  .cascade-context .cascade-label {
    color: var(--txt2);
  }
  .cascade-subtotal {
    border-bottom: none;
    border-top: 0.5px solid var(--txt2);
    padding-top: 6px;
    margin-top: 2px;
  }
  .cascade-total {
    border-bottom: none;
    border-top: 1px solid var(--txt1);   /* zwaarder dan .cascade-subtotal — eindrij */
    padding-top: 6px;
    /* cascade-total is altijd de laatste rij; padding-bottom (8px uit
       .cascade-row) verwijderen scheelt witruimte boven de pane-bottom. */
    padding-bottom: 0;
    margin-top: 2px;
  }
  .cascade-total .cascade-label {
    color: var(--txt1);
  }
  /* v3.0.82: cascade-getallen amber, consistent met M1=groen / M2=rood */
  .pane-m12 .cascade-val strong {
    color: var(--amber);
  }
  .cascade-total .cascade-val strong {
    font-size: var(--num-m);
  }
  /* v3.0.164: percentage van VPV achter het Verdeelbaar overschot-bedrag */
  .cascade-pct {
    font-size: var(--num-s);
    color: var(--txt2);
    font-weight: 400;
    margin-left: 4px;
  }
  /* v3.0.83: tekort (negatief overschot) krijgt rood — bij DG ≤ 100% of
     bij negatief verdeelbaar overschot na reserves. */
  .pane-m12 .cascade-negatief .cascade-val strong {
    color: var(--red);
  }
  .pane-m12 .cascade-negatief .cascade-label {
    color: var(--red);
  }
  .afwijk-marker {
    display: inline-block;
    color: var(--amber);
    font-size: 14px;
    line-height: 1;
    margin: 0 4px;
    cursor: help;
  }
  .pane-afwijk-banner {
    display: inline-block;
    background: var(--amber);
    color: white;
    font-size: 11px;
    line-height: 14px;
    padding: 2px 10px;
    border-radius: var(--r6);
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    vertical-align: middle;
    min-width: 6em;
    text-align: center;
  }
  /* v3.0.101: Reset-knop naast Bewerkt-marker in pane-header; identieke
     compacte pill-styling als de banner (zelfde padding/line-height/min-width)
     maar inverse kleuren — banner = amber bg + white tekst, reset = card bg +
     txt1 tekst. Beide visueel even hoog en even breed. */
  .reset-cascade-btn {
    display: inline-block;
    background: var(--card);
    color: var(--txt1);
    border: 1px solid var(--bdr);
    border-radius: var(--r6);
    font: inherit;
    font-size: 11px;
    line-height: 14px;
    padding: 2px 10px;
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    vertical-align: middle;
    min-width: 6em;
    text-align: center;
    cursor: pointer;
  }
  .reset-cascade-btn:hover {
    border-color: var(--txt1);
    background: var(--surf);
  }

  /* v3.0.34: fondskeuze-radios — naast elkaar, klikbare hele label */
  .fonds-radios {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .fonds-radio {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r8);
    cursor: pointer;
    background: var(--card);
    font-size: 13px;
    user-select: none;
  }
  .fonds-radio:hover { background: var(--surf); }
  .fonds-radio:has(input:checked) {
    background: var(--surf);
    border-color: var(--txt1);
    font-weight: 600;
  }
  /* v3.0.38: wrapper houdt fonds-radio + ?-knop visueel bij elkaar zonder dat
     klik op ? de radio toggelt (help-icon staat buiten het <label>). */
  .fonds-radio-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  /* v3.0.47: bij één fonds geen radios maar fondsnaam + ?-knop */
  .fonds-single {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fonds-single .fonds-name {
    font-weight: 600;
    color: var(--txt1);
  }

  .intro {
    color: var(--txt2);
    font-size: 13px;
    margin-bottom: 14px;
    line-height: 1.55;
  }

  /* ─── Form fields ───────────────────────────────────────────── */
  .form { margin-bottom: 14px; }
  .field {
    display: grid;
    grid-template-columns: 220px 1fr;
    column-gap: 14px;
    align-items: center;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--bdr);
  }
  .field:last-child { border-bottom: none; }
  .field > label {
    font-size: 11px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field input[type="number"],
  .field input[type="text"],
  .field select {
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--bdr2);
    border-radius: var(--r6);
    background: var(--card);
    color: var(--txt1);
    width: 100%;
    max-width: 200px;
    font-family: inherit;
  }
  .field input[type="checkbox"] {
    justify-self: start;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .field input:focus-visible,
  .field select:focus-visible {
    outline: 2px solid var(--txt1);
    outline-offset: 1px;
  }

  /* ─── Radio-groups (gender + spreidingstermijn) ─────────────── */
  .radio-group-inline {
    display: inline-flex;
    gap: 14px;
  }
  .radio-group-inline .radio-inline,
  .radio-group label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    font-weight: 500;
    color: var(--txt1);
  }
  input[type="radio"] {
    accent-color: var(--green);
    cursor: pointer;
  }
  .pane-m2 input[type="radio"] { accent-color: var(--red); }
  .pane-m12 input[type="radio"] { accent-color: var(--amber); }

  /* ─── Sliders ───────────────────────────────────────────────── */
  input[type="range"] {
    width: 100%;
    margin: 6px 0 0;
    cursor: pointer;
    accent-color: var(--green);
  }
  .pane-m2 input[type="range"] { accent-color: var(--red); }
  .pane-m12 input[type="range"] { accent-color: var(--amber); }

  .rente-control,
  .slider-control {
    margin-top: 14px;
  }
  .slider-control:first-child { margin-top: 0; }
  .slider-control + .slider-control,
  .rente-control + .slider-control {
    padding-top: 14px;
    border-top: 0.5px solid var(--bdr);
  }

  /* v3.0.173 (fase 1): basic-variant toont rekenrente als vaste waarde
     i.p.v. slider. .rente-vast vervangt de slider+markers door alleen
     het label-strong-paar + een kleine bron-regel. */
  .rente-vast .rente-bron {
    margin-top: 4px;
    font-size: 11px;
    color: var(--txt2);
    line-height: 1.4;
  }

  /* v3.0.11: 2-koloms slider-paar voor leeftijd + pensioen bovenaan scherm 1 */
  /* v3.0.217: .pen-input-number basis-styling is geconsolideerd in de
     gedeelde .wizard-field input[type=number] regel (uniforme height 40px).
     Alleen :focus-state houdt een eigen regel voor de groene
     focus-glow. */
  .pen-input-number:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 2px rgba(0, 128, 0, 0.15);
  }
  .pen-input-hint {
    margin-top: 4px;
    font-size: 11px;
    color: var(--txt2);
    line-height: 1.4;
  }

  /* v3.0.111: 2-koloms layout opgeheven — alle sliders in pane-m1 nu full-
     width, consistent met de cascade-rows in pane-m12 die ook full-width zijn.
     grid blijft, grid-template-columns: 1fr (was 1fr 1fr). */
  .slider-pair {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--bdr);
  }
  .slider-pair .slider-control {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  /* partner-block (sliders + radio) */
  .partner-block {
    margin-top: 4px;
  }
  .partner-block .slider-pair {
    margin-bottom: 10px;
    padding-bottom: 10px;
  }
  .partner-block .field {
    border-bottom: 0.5px solid var(--bdr);
    padding-bottom: 8px;
  }

  /* hoog-laag-blok — toggle + uitklap-velden (canoniek blok ~r.600) */
  @media (max-width: 640px) {
    .slider-pair {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    /* v3.0.72: M2-sliders blijven naast elkaar ook in smalle viewport
       (sidebar-preview, mobiel). DG- en aftrek-slider zijn compacter dan
       M1's slider-pair en passen daarom wel naast elkaar bij krappe
       breedte. Iets kleinere gap voor sidebar-fit. */
    .m2-controls .slider-pair {
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  }

  /* Slider-label-stand: huidige waarde bold boven */
  .slider-label-stand {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .slider-label-stand strong {
    font-size: 18px;
    font-weight: 600;
    color: var(--txt1);
    letter-spacing: 0;
    text-transform: none;
  }
  .pane-m2 .slider-label-stand strong { color: var(--red); }
  .pane-m12 .slider-label-stand strong { color: var(--amber); }
  /* hoog-laag-blok — toggle + uitklap-velden. v3.0.136: gemerged uit twee
     overlappende blokken (v3.0.57 + v3.0.57-revisie); properties volgen
     strict CSS-cascade van de oude volgorde, geen visuele wijziging. */
  .hooglaag-block {
    margin-top: 14px;
    margin-bottom: 8px;
  }
  .hooglaag-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--bdr);
    gap: 12px;
    margin-bottom: 8px;
  }
  .hooglaag-toggle .hooglaag-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
  }
  .hooglaag-toggle .radio-pair {
    display: inline-flex;
    gap: 12px;
    font-size: 13px;
  }
  .hooglaag-toggle .radio-pair label {
    font-size: 13px;
    color: var(--txt1);
    cursor: pointer;
  }
  .hooglaag-fields {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 0.5px dashed var(--bdr);
  }
  .hooglaag-warn {
    display: inline-block;
    color: var(--red);
    font-size: 12px;
    line-height: 1.4;
  }
  .pane-m1 .slider-label-stand strong { color: var(--green); }

  /* v3.0.53: date-input rechts in label, op zelfde regel als labeltekst.
     v3.0.55: terug naar neutrale stijl (zonder donker-thema/hover-toeters).
     Kalender-icoon ervoor draagt de affordance — visueel rustig, klikbaarheid
     blijft duidelijk. Wrap-div .dob-wrap groepeert icoon + input. */
  .slider-label-stand .dob-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--txt2);
  }
  .slider-label-stand .dob-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  .slider-label-stand .dob-input {
    font-family: inherit;
    font-size: 11px;
    color: var(--txt1);
    letter-spacing: 0;
    text-transform: none;
    padding: 0 6px;
    border: 0.5px solid var(--bdr);
    border-radius: var(--r6);
    background: var(--card);
    cursor: pointer;
    /* v3.0.96: vaste min-width zodat date-picker en dropdown-pill dezelfde
       visuele breedte krijgen. ~10.5em accommodeert "08-05-1956" + native
       browser-iconen op Chrome/Safari/Firefox.
       v3.0.97: expliciete height ipv padding-y zodat date-input en select
       in alle browsers identieke hoogte krijgen (Chrome/Safari verschillen
       anders door verschillende internal box-models tussen date-input en
       select-element).
       v3.0.98: DOB-breedte gelijkgetrokken aan dropdown-pill (8.4em).
       Op desktop/iPad Safari rendert de date-input "11 May 1956" compact
       genoeg om in 8.4em te passen. Visuele rust gaat boven karakter-ruimte. */
    height: 22px;
    line-height: 22px;
    min-width: 8.4em;
    box-sizing: border-box;
    vertical-align: middle;
  }
  .slider-label-stand .dob-input:focus {
    /* v3.0.97: zachte focus-ring met halfzichtbare border-kleur ipv harde
       donkere txt1-outline. Subtiele affordance, geen visuele schreeuw. */
    outline: 2px solid var(--bdr2);
    outline-offset: 1px;
  }

  /* v3.0.96: dropdown-pill voor geslacht-, hoog-laag- en heeftPartner-
     keuzes. Mirror styling van .dob-input zodat alle ingangen rechts in
     dezelfde kolom uitgelijnd lezen: zelfde padding, border-radius, font-
     size.
     v3.0.97: 20% smaller (8.4em ipv 10.5em) zodat dropdown smaller is dan
     date-picker; date-picker bevat meer karakters en mag breder lezen. */
  .dropdown-pill {
    font-family: inherit;
    font-size: 11px;
    color: var(--txt1);
    letter-spacing: 0;
    text-transform: none;
    padding: 0 6px;
    border: 0.5px solid var(--bdr);
    border-radius: var(--r6);
    background: var(--card);
    cursor: pointer;
    /* v3.0.97: identieke height aan dob-input (22px) zodat de pillen op
       dezelfde regel-baseline staan. */
    height: 22px;
    line-height: 22px;
    min-width: 8.4em;
    box-sizing: border-box;
    vertical-align: middle;
    /* Browser-default-pijltje behouden voor affordance; geen custom chevron
       om CSP-conform en simpel te blijven. */
  }
  .dropdown-pill:focus {
    /* v3.0.97: zelfde zachte focus-stijl als dob-input. */
    outline: 2px solid var(--bdr2);
    outline-offset: 1px;
  }

  /* v3.0.52: leeftijd-caption onder geboortedatum-input — neutraal getint
     (txt2), niet rood-thema, zodat het als afgeleide info leest. */
  .age-caption {
    margin-top: 4px;
    font-size: 12px;
    color: var(--txt2);
    line-height: 1.3;
  }

  /* v3.0.93: verwachte sterfleeftijd-caption, direct onder leeftijd-caption.
     Zelfde stijl als age-caption maar krappere top-margin omdat het visueel
     één blok afgeleide info vormt met de leeftijd. */
  .lifeexp-caption {
    margin-top: 2px;
    font-size: 12px;
    color: var(--txt2);
    line-height: 1.3;
    min-height: 1.3em;
  }

  /* v3.0.58: geslacht-radio onder geboortedatum, compact horizontaal.
     v3.0.61: radio-groep right-aligned (label links, knoppen rechts) zodat
     het visueel uitlijnt met de stand-strong van andere slider-controls.
     v3.0.66: radio-cellen via 2-kolom-grid met vaste breedte zodat bullets
     verticaal uitlijnen tussen rijen (Man/Nee bullets boven elkaar; Vrouw/Ja
     bullets boven elkaar). min-width hielp niet voor "Vrouw" omdat die zelf
     al breder rendert dan 4.5em; grid forceert exacte cellen.
     v3.0.96: radios vervangen door dropdown-pills; .field-inline-radio blijft
     als rij-wrapper (label links, control rechts), maar de child is nu een
     <select>, niet meer een .radio-group-inline grid. CSS-class naam blijft
     ongewijzigd voor backward-compat. */
  .field-inline-radio {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 13px;
  }
  .field-inline-radio .inline-radio-label {
    color: var(--txt2);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.4px;
  }

  /* v3.0.99: .partner-fields wrapper rondom partner-sliders; heeftPartner-
     dropdown staat erbuiten in partner-block. margin-top voor visuele lucht
     tussen dropdown en sliders. */
  .partner-fields {
    margin-top: 12px;
  }
  .partner-fields[hidden] {
    display: none;
  }

  /* Min/midden/max-markers onder de slider */
  .slider-markers {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--txt2);
    margin-top: 4px;
    padding: 0 2px;
  }
  .slider-markers .marker-min { text-align: left; flex: 1; }
  .slider-markers .marker-mid { text-align: center; flex: 1; }
  .slider-markers .marker-max { text-align: right; flex: 1; }

  .slider-help {
    font-size: 12px;
    color: var(--txt2);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* help-icon (?) naast slider-labels */
  .help-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 0.5px solid var(--bdr2);
    background: var(--card);
    color: var(--txt2);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 6px;
    padding: 0;
    line-height: 1;
    transition: all 0.15s ease;
    vertical-align: 1px;
  }
  .help-icon:hover {
    background: var(--txt1);
    color: #fff;
    border-color: var(--txt1);
  }
  .help-icon:focus-visible {
    outline: 2px solid var(--txt1);
    outline-offset: 2px;
  }

  /* help-modal */
  .help-modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    z-index: 1000;
    overflow-y: auto;
  }
  .help-modal {
    background: var(--card);
    border-radius: var(--r12);
    padding: 18px 20px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    position: relative;
  }

  /* v3.0.119: sensitivity-modal — wijder dan help-modal voor grafiek-viewport.
     Hergebruikt help-modal-overlay maar eigen container met max-width 800px. */
  .sensitivity-modal {
    background: var(--card);
    border-radius: var(--r12);
    padding: 18px 20px;
    max-width: 800px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    position: relative;
  }

  /* sensitivity-grafiek inhoud */
  .sens-desc {
    font-size: 12px;
    color: var(--txt2);
    margin: 0 0 18px 0;
    line-height: 1.5;
  }
  .sens-chart-container { margin: 0 0 18px 0; }
  svg.sens-chart {
    display: block;
    width: 100%;
    height: auto;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .sens-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    font-size: 12px;
    color: var(--txt2);
    padding: 12px 0 0 0;
    border-top: 0.5px solid var(--bdr);
  }
  .sens-legend-item { display: flex; align-items: center; gap: 6px; }
  .sens-legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1a6db5;
  }
  .sens-legend-line {
    display: inline-block;
    width: 18px;
    height: 2px;
    background: #C07A00;
  }
  .sens-legend-line.dashed {
    background: transparent !important;
    background-image: linear-gradient(to right, #C07A00 0 4px, transparent 4px 7px, #C07A00 7px 11px, transparent 11px 14px, #C07A00 14px 18px) !important;
    opacity: 0.7;
  }
  .sens-summary {
    background: var(--surf);
    border-radius: var(--r8);
    padding: 12px 14px;
    margin-top: 14px;
  }
  .sens-summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
  }
  .sens-summary-label { color: var(--txt2); }
  .sens-summary-val {
    font-weight: 600;
    color: var(--blue);
  }
  .sens-meta-note {
    font-size: 11px;
    color: var(--txt2);
    margin: 16px 0 0 0;
    padding-top: 10px;
    border-top: 0.5px dashed var(--bdr);
    line-height: 1.5;
  }
  .help-modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    font-size: 24px;
    line-height: 1;
    color: var(--txt2);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--r6);
  }
  .help-modal-close:hover {
    background: var(--surf);
    color: var(--txt1);
  }
  .help-modal-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0 30px 12px 0;
    color: var(--txt1);
    line-height: 1.3;
  }
  .help-modal-current {
    font-size: 13px;
    color: var(--txt2);
    background: var(--surf);
    padding: 8px 12px;
    border-radius: var(--r6);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .help-modal-section-h {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
    margin: 14px 0 6px;
  }
  .help-modal-section-h:first-child { margin-top: 0; }
  .help-modal-section-body {
    font-size: 13px;
    color: var(--txt1);
    line-height: 1.45;
    margin: 0;
  }
  /* parameter-tabel in fonds-?-modal */
  .help-modal-params {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 4px;
    font-size: 12.5px;
  }
  .help-modal-params thead th {
    text-align: left;
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
    border-bottom: 1px solid var(--bdr);
    padding: 6px 8px 6px 0;
  }
  .help-modal-params tbody td {
    padding: 6px 8px 6px 0;
    border-bottom: 0.5px solid var(--bdr);
    color: var(--txt1);
    vertical-align: top;
  }
  .help-modal-params tbody tr:last-child td { border-bottom: none; }
  .help-modal-params td.num {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    font-weight: 500;
  }
  .help-modal-params .adj-yes {
    color: var(--green);
    font-weight: 500;
  }
  .help-modal-params .adj-no {
    color: var(--txt2);
  }
  /* v3.0.45: aanwendings-cascade — toont input + plus → subtotal − minus → total */
  .help-modal-cascade {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 4px;
    font-size: 12.5px;
  }
  .help-modal-cascade tbody td {
    padding: 5px 8px 5px 0;
    color: var(--txt1);
    vertical-align: top;
  }
  .help-modal-cascade .casc-sign {
    width: 18px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    color: var(--txt2);
    font-weight: 600;
  }
  .help-modal-cascade .casc-val {
    text-align: right;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .help-modal-cascade .casc-note {
    font-size: 11px;
    color: var(--txt2);
    line-height: 1.4;
    margin-top: 2px;
  }
  .help-modal-cascade .casc-input td,
  .help-modal-cascade .casc-plus td {
    border-bottom: 0.5px solid var(--bdr);
  }
  .help-modal-cascade .casc-subtotal td {
    border-top: 1px solid var(--txt2);
    border-bottom: 0.5px solid var(--bdr);
    font-weight: 600;
    background: var(--surf);
  }
  .help-modal-cascade .casc-minus td {
    border-bottom: 0.5px solid var(--bdr);
  }
  .help-modal-cascade .casc-total td {
    border-top: 1px solid var(--txt1);
    font-weight: 600;
  }
  .help-modal-cascade .casc-total .casc-val {
    color: var(--green);
  }
  .help-modal-section-body.casc-outro {
    margin-top: 10px;
    font-style: italic;
    color: var(--txt2);
  }
  @media (max-width: 640px) {
    .help-modal {
      padding: 18px 20px;
    }
  }

  /* ─── KPI-cards ─────────────────────────────────────────────── */
  .output { margin-top: 14px; }
  .kpi-card {
    background: var(--surf);
    border-radius: var(--r12);
    padding: 14px 18px;
    text-align: left;
    /* v3.0.136: transition naar hier verplaatst uit aparte tweede .kpi-card-
       regel verderop (was duplicate-shadow). */
    transition: background 0.3s ease;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .kpi-value {
    font-size: var(--num-l);
    font-weight: 700;
    color: var(--green);
    line-height: 1.1;
    margin: 4px 0;
  }
  .kpi-m2 .kpi-value { color: var(--red); }
  .kpi-delta {
    font-size: var(--num-s);
    font-weight: 600;
    margin: 2px 0 0;
    color: var(--txt2);
  }
  .kpi-delta.pos { color: var(--green); }
  .kpi-delta.neg { color: var(--red); }

  /* v3.0.85: drielaagse opbouwsom in M2-KPI — laat verband M1 + M1/2 = M2
     visueel zien met dezelfde kleuren als de panes. */
  .kpi-formula {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .kpi-formula-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 14px;
  }
  .kpi-formula-row .kpi-formula-label {
    color: var(--txt2);
  }
  .kpi-formula-row .kpi-formula-val {
    font-weight: 700;
    font-size: var(--num-m);
    text-align: right;
    white-space: nowrap;
  }
  .kpi-formula-total {
    border-top: 1px solid var(--txt1);
    padding-top: 8px;
    margin-top: 4px;
  }
  .kpi-formula-total .kpi-formula-label {
    color: var(--txt1);
    font-weight: 600;
  }
  .kpi-formula-total .kpi-formula-val {
    font-size: var(--num-l);
  }
  .kpi-m1-color { color: var(--green); }
  .kpi-m12-color { color: var(--amber); }
  .kpi-m2-color { color: var(--red); }
  .kpi-formula-foot {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 0.5px dashed var(--bdr);
    font-size: var(--num-s);
    color: var(--txt2);
    text-align: right;
  }
  /* v3.0.122: secundaire foot-regel voor jaarpensioen-equivalent.
     Geen eigen border, kleinere top-marge — staat direct onder %-regel. */
  .kpi-formula-foot-secondary {
    margin-top: 4px;
    padding-top: 0;
    border-top: none;
    font-size: var(--num-s);
    color: var(--txt2);
    text-align: right;
  }
  /* v3.0.143: alternatieve invaarmethode-blok onder de hoofd-KPI.
  /* v3.0.216 (cleanup-fase 1): .kpi-alt-* en .m2-pi-control verwijderd —
     dode CSS (geen HTML-gebruik). .modal-pi-control blijft. */
  .modal-pi-control {
    margin: 0 0 1.25rem;
    padding: 12px 14px;
    background: var(--bg2);
    border-radius: 8px;
    border: 0.5px solid var(--bdr);
  }
  .kpi-breakdown {
    font-size: 12px;
    color: var(--txt2);
    margin-top: 12px;
    padding-top: 10px;
    border-top: 0.5px solid var(--bdr);
    display: flex;
    gap: 28px;
  }
  .kpi-sub-label {
    font-size: 10px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .kpi-sub-value {
    font-size: var(--num-m);
    font-weight: 600;
    color: var(--txt1);
    margin-top: 2px;
  }
  .kpi-foot {
    font-size: var(--num-s);
    color: var(--txt2);
    margin-top: 10px;
    padding-top: 8px;
    border-top: 0.5px solid var(--bdr);
  }

  /* v3.0.165: screen-reader-only utility, gebruikt als placeholder-content
     voor dynamisch-gevulde headings (h2 modal-titles). Voorkomt empty-heading
     accessibility-warnings; JS overschrijft de inhoud bij modal-open. */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* M2-controls block (sliders + radios)
     v3.0.105: border-top weg (visuele divider niet meer nodig).
     v3.0.106: margin-top + padding-top weg zodat M2-spacing aansluit op M1.
     v3.0.112: horizontale padding 18px toegevoegd, BLEEK FOUT — label
     werd verder ingesprongen dan kpi-card-tekst (overshoot).
     v3.0.113: padding terug naar leeg. M2 spreidingN gebruikt nu dezelfde
     edge-uitlijning als M1 (geslacht/hooglaag/partner): label aan pane-
     content-left, dropdown aan pane-content-right via flex space-between.
     v3.0.165: empty CSS-rule .m2-controls weggehaald — geen actieve
     styling meer nodig; comment-historie bewaard. */
  /* v3.0.73: extra witregel tussen sliders/spreiding-radio en KPI-card */
  .m2-output {
    margin-top: 22px;
  }

  /* ─── Audit-pane content ────────────────────────────────────── */
  .meta-note {
    font-size: 11px;
    color: var(--txt2);
    margin-top: 12px;
    padding-top: 8px;
    border-top: 0.5px dashed var(--bdr);
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 6px;
    font-size: 12px;
  }
  th, td {
    border-bottom: 0.5px solid var(--bdr);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--surf);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
  }
  td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', Consolas, monospace;
  }
  tr.display-decompositie td { background: rgba(0,0,0,0.01); }
  tr.display-deepdive td { background: rgba(0,0,0,0.025); color: var(--txt2); }
  /* v3.0.165: kleur #884444 → #5a1a1a voor WCAG AA contrast (~9:1) op
     de licht-rode rgba(212,0,26,0.04)-achtergrond. */
  tr.display-diagnose td { background: rgba(212,0,26,0.04); color: #5a1a1a; }
  tr.cohort-totals td {
    font-weight: 600;
    background: var(--surf);
    border-top: 1px solid var(--bdr2);
  }
  .cohort-table { font-size: var(--num-s); }
  .modtag {
    display: inline-block;
    font-size: var(--num-s);
    padding: 1px 6px;
    margin-right: 5px;
    border-radius: 6px;
    font-family: monospace;
    vertical-align: middle;
  }
  .modtag-shared { background: var(--surf); color: var(--txt2); }
  .modtag-m1 { background: rgba(26,138,69,0.12); color: var(--green); }
  .modtag-m2 { background: rgba(212,0,26,0.10); color: var(--red); }
  .specref {
    font-family: monospace;
    font-size: 11px;
    color: var(--txt2);
  }
  code {
    font-family: monospace;
    background: var(--surf);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }
  .info {
    cursor: help;
    color: var(--amber);
    font-size: 12px;
    margin-left: 4px;
  }
  .disclosure-list {
    font-size: 12px;
    padding-left: 16px;
    line-height: 1.55;
  }
  .disclosure-list li { margin-bottom: 4px; }
  .error {
    background: rgba(212,0,26,0.06);
    color: var(--red);
    padding: 10px 12px;
    border-radius: var(--r6);
    font-size: 13px;
  }

  /* ─── Topline (h1 + ?-knop) ──────────────────────────────────── */
  .topline {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding: 0 4px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .topline h1 {
    margin-bottom: 0;
    flex: 1;
  }
  /* doelgroep-ondertitel onder h1 */
  .topline-title {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .topline-title h1 {
    margin: 0;
  }
  .topline-subtitle {
    margin: 0;
    font-size: 13px;
    color: var(--txt2);
    font-weight: 400;
    line-height: 1.3;
  }
  /* v3.0.102: fondsnaam (volledige label) tussen h1 en subtitle. Iets groter
     en in txt1, want het is identificerend, geen subtitle-context. */
  .topline-fondsnaam {
    margin: 0;
    font-size: 13px;
    color: var(--txt1);
    font-weight: 500;
    line-height: 1.3;
  }
  .topline-help-btn {
    flex-shrink: 0;
  }
  /* v3.0.131: verticale stack voor Uitleg + Verantwoording-knoppen */
  .topline-btn-stack {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
  }
  .topline-btn-stack .topline-text-btn {
    width: 100%;
    text-align: center;
  }
  /* Uitleg-tekstknop in topline */
  .topline-text-btn {
    flex-shrink: 0;
    padding: 4px 12px;
    border: 0.5px solid var(--bdr2);
    background: var(--card);
    color: var(--txt1);
    border-radius: var(--r6);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    user-select: none;
  }
  .topline-text-btn:hover {
    background: var(--surf);
    border-color: var(--txt1);
  }
  /* v3.0.130: rode-tekst-variant voor de Verantwoording-knop */
  .topline-text-btn-red {
    color: #c00;
    border-color: #c00;
  }
  .topline-text-btn-red:hover {
    background: #fee;
    border-color: #900;
    color: #900;
  }
  /* v3.0.130: simpele-tabel-styling voor disclaimer-tabellen (ABN-vergelijking) */
  .help-modal-simpletable {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 12px;
  }
  .help-modal-simpletable th,
  .help-modal-simpletable td {
    border: 0.5px solid var(--bdr);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  .help-modal-simpletable th {
    background: var(--surf);
    font-weight: 600;
    color: var(--txt1);
  }
  .help-modal-simpletable td {
    color: var(--txt2);
  }
  /* v3.0.131: footer-link knop in help-modal (Privacy → Verantwoording) */
  .help-modal-footer-link {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 0.5px dashed var(--bdr);
    text-align: right;
  }
  .help-modal-link-btn {
    background: none;
    border: 0.5px solid #c00;
    color: #c00;
    padding: 6px 14px;
    border-radius: var(--r6);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .help-modal-link-btn:hover {
    background: #fee;
    color: #900;
    border-color: #900;
  }

  /* ─── Audit-unlock + footer ─────────────────────────────────── */
  .audit-unlock {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 0.5px dashed var(--bdr);
    font-size: 12px;
    color: var(--txt2);
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .audit-unlock summary {
    cursor: pointer;
    user-select: none;
    color: var(--txt2);
  }
  .audit-unlock summary:hover { color: var(--txt1); }
  .audit-unlock-form {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .audit-unlock-form input {
    padding: 6px 10px;
    border: 1px solid var(--bdr2);
    border-radius: var(--r6);
    font-size: 13px;
    flex: 1;
    min-width: 160px;
    font-family: inherit;
  }
  .audit-unlock-form button {
    padding: 6px 14px;
    background: var(--txt1);
    color: #fff;
    border: none;
    border-radius: var(--r6);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
  }
  .audit-unlock-form button:hover { background: #000; }

  /* v3.0.179: border-top boven footer verwijderd. De footer staat
     visueel los van de pane (eigen typografie) en heeft geen extra
     scheidingslijn nodig. */
  .site-footer {
    margin-top: 32px;
    padding-top: 16px;
    font-size: 12px;
    color: var(--txt2);
    text-align: center;
    line-height: 1.6;
  }
  .site-footer p { margin: 3px 0; font-size: 12px; color: var(--txt2); }
  .site-footer .footer-disclaimer { color: var(--txt1); }
  .site-footer .footer-meta { color: var(--txt2); font-size: 11px; }

  /* ─── KPI-flash (subtiele animatie bij Enter-bevestig) ──────── */
  .kpi-card.flash { animation: kpi-flash 0.45s ease-out; }
  @keyframes kpi-flash {
    0%   { background: var(--surf); }
    25%  { background: rgba(212,0,26,0.10); }
    100% { background: var(--surf); }
  }
  .kpi-m2.flash { animation: kpi-flash-m2 0.45s ease-out; }
  @keyframes kpi-flash-m2 {
    0%   { background: var(--surf); }
    25%  { background: rgba(26,138,69,0.12); }
    100% { background: var(--surf); }
  }

  /* ─── Mobile ────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    body { padding: 16px 12px 40px; }
    body > .topline h1,
    body > h1 { font-size: 16px; }
    .pane { padding: 14px 16px; }
    .field {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .field input[type="number"],
    .field input[type="text"],
    .field select { max-width: 100%; }
    .kpi-breakdown { gap: 16px; }
    /* v3.0.91: kpi-value mobile-override (was 26px) verwijderd — token
       --num-l (28px) werkt cross-device. */
  }

  /* ─── v3.0.41: Print-knop en print-rapport ───────────────────── */
  /* Knop in de actie-pane onder de M2-output. Bewust subtiel: een
     secundaire actie, niet de hoofd-CTA. */
  /* v3.0.154: pane-actions met h2-label. De h2 kreeg flex-basis 100%
     zodat hij op een eigen regel kwam boven de knoppen-rij. */
  /* v3.0.171: pane-actions niet langer zelf flex-container; in plaats
     daarvan zit de knoppen-rij in een interne '.action-btn-row'-wrapper
     binnen <details>. Hierdoor blijft het collapsible-patroon werken
     (summary boven, knoppen daaronder als rij). */
  .pane.casual.pane-actions {
    border-left: 3px solid var(--txt2);
    /* v3.0.104: padding-override 12px 16px verwijderd; erft nu 18px 20px van
       .pane zodat de knoppen op dezelfde linker-rand staan als de h2-titels
       in M1, M1/2 en M2-panes. */
  }
  .action-btn-row {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .pane-actions .action-btn {
    background: var(--surf);
    color: var(--txt1);
    border: 1px solid var(--bdr);
    border-radius: 6px;
    /* v3.0.161: padding strakker (8px 16px → 6px 10px) en vaste breedte
       gebaseerd op de breedste knop-tekst ("Koopkrachtontwikkeling"),
       zodat alle action-btn's in beide panes dezelfde afmetingen hebben. */
    padding: 6px 10px;
    min-width: 13em;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
  }
  .pane-actions .action-btn:hover {
    background: var(--bdr);
    border-color: var(--txt2);
  }
  .pane-actions .action-btn:focus-visible {
    outline: 2px solid var(--txt1);
    outline-offset: 2px;

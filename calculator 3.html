<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invaarcalculator — pensioenaanspraak nu en na invaren</title>
<style>
  /* ─── Reset ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  button { font: inherit; color: inherit; }

  /* ─── Design tokens (overgenomen uit invaarcalculator.nl 21-04-2026) ── */
  :root {
    --bg:    #f4f4f2;
    --card:  #fff;
    --surf:  #f0efed;
    --txt1:  #1a1a1a;
    --txt2:  #6b7280;
    --bdr:   rgba(0,0,0,0.10);
    --bdr2:  rgba(0,0,0,0.18);
    --red:   #D4001A;
    --blue:  #1a6db5;
    --green: #1a8a45;
    --amber: #C07A00;
    --r6:  6px;
    --r8:  8px;
    --r12: 12px;
  }

  /* ─── Base ──────────────────────────────────────────────────── */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: var(--txt1);
    background: var(--bg);
    min-height: 100vh;
    padding: 24px 16px 48px;
    line-height: 1.45;
  }
  .wrap, body > .topline, body > #app, body > footer {
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  body > .topline h1,
  body > h1 {
    font-size: 18px;
    font-weight: 600;
    padding: 0 4px;
  }
  body > h1 { margin-bottom: 14px; }

  h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--txt1);
  }
  h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--txt1);
    margin-top: 14px;
    margin-bottom: 8px;
  }
  p { font-size: 13px; color: var(--txt2); line-height: 1.55; }
  a { color: var(--blue); }

  /* ─── View-toggle (zichtbaar wanneer audit unlocked) ────────── */
  .view-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .view-toggle button {
    flex: 1;
    padding: 8px 14px;
    border: 0.5px solid var(--bdr2);
    background: var(--card);
    cursor: pointer;
    border-radius: var(--r8);
    font-size: 13px;
    color: var(--txt1);
  }
  .view-toggle button.active {
    background: var(--txt1);
    color: #fff;
    border-color: var(--txt1);
  }

  /* ─── Pane = Card ───────────────────────────────────────────── */
  .pane {
    background: var(--card);
    border: 0.5px solid var(--bdr);
    border-radius: var(--r12);
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .pane.casual.pane-m1 { border-left: 3px solid var(--red); }
  .pane.casual.pane-m2 { border-left: 3px solid var(--green); }
  .pane.casual.pane-fonds { border-left: 3px solid var(--txt1); }
  .pane.audit          { border-left: 3px solid var(--amber); }

  /* v3.0.34: fondskeuze-radios — naast elkaar, klikbare hele label */
  .fonds-radios {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .fonds-radio {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r8);
    cursor: pointer;
    background: var(--card);
    font-size: 13px;
    user-select: none;
  }
  .fonds-radio:hover { background: var(--surf); }
  .fonds-radio:has(input:checked) {
    background: var(--surf);
    border-color: var(--txt1);
    font-weight: 600;
  }
  /* v3.0.38: wrapper houdt fonds-radio + ?-knop visueel bij elkaar zonder dat
     klik op ? de radio toggelt (help-icon staat buiten het <label>). */
  .fonds-radio-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .intro {
    color: var(--txt2);
    font-size: 13px;
    margin-bottom: 14px;
    line-height: 1.55;
  }

  /* ─── Form fields ───────────────────────────────────────────── */
  .form { margin-bottom: 14px; }
  .field {
    display: grid;
    grid-template-columns: 220px 1fr;
    column-gap: 14px;
    align-items: center;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--bdr);
  }
  .field:last-child { border-bottom: none; }
  .field > label {
    font-size: 11px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field input[type="number"],
  .field input[type="text"],
  .field select {
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--bdr2);
    border-radius: var(--r6);
    background: var(--card);
    color: var(--txt1);
    width: 100%;
    max-width: 200px;
    font-family: inherit;
  }
  .field input[type="checkbox"] {
    justify-self: start;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .field input:focus-visible,
  .field select:focus-visible {
    outline: 2px solid var(--txt1);
    outline-offset: 1px;
  }

  /* ─── Radio-groups (gender + spreidingstermijn) ─────────────── */
  .radio-group-inline {
    display: inline-flex;
    gap: 14px;
  }
  .radio-group-inline .radio-inline,
  .radio-group label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    font-weight: 500;
    color: var(--txt1);
  }
  input[type="radio"] {
    accent-color: var(--red);
    cursor: pointer;
  }
  .pane-m2 input[type="radio"] { accent-color: var(--green); }

  /* ─── Sliders ───────────────────────────────────────────────── */
  input[type="range"] {
    width: 100%;
    margin: 6px 0 0;
    cursor: pointer;
    accent-color: var(--red);
  }
  .pane-m2 input[type="range"] { accent-color: var(--green); }

  .rente-control,
  .slider-control {
    margin-top: 14px;
  }
  .slider-control:first-child { margin-top: 0; }
  .slider-control + .slider-control,
  .rente-control + .slider-control {
    padding-top: 14px;
    border-top: 0.5px solid var(--bdr);
  }

  /* v3.0.11: 2-koloms slider-paar voor leeftijd + pensioen bovenaan scherm 1 */
  .slider-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--bdr);
  }
  .slider-pair .slider-control {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  /* v3.0.12: partner-block (sliders + radio) */
  .partner-block {
    margin-top: 4px;
  }
  .partner-block .slider-pair {
    margin-bottom: 10px;
    padding-bottom: 10px;
  }
  .partner-block .field {
    border-bottom: 0.5px solid var(--bdr);
    padding-bottom: 8px;
  }
  @media (max-width: 640px) {
    .slider-pair {
      grid-template-columns: 1fr;
      gap: 14px;
    }
  }

  /* Slider-label-stand: huidige waarde bold boven */
  .slider-label-stand {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .slider-label-stand strong {
    font-size: 18px;
    font-weight: 600;
    color: var(--txt1);
    letter-spacing: 0;
    text-transform: none;
  }
  .pane-m2 .slider-label-stand strong { color: var(--green); }
  .pane-m1 .slider-label-stand strong { color: var(--red); }

  /* Min/midden/max-markers onder de slider */
  .slider-markers {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--txt2);
    margin-top: 4px;
    padding: 0 2px;
  }
  .slider-markers .marker-min { text-align: left; flex: 1; }
  .slider-markers .marker-mid { text-align: center; flex: 1; }
  .slider-markers .marker-max { text-align: right; flex: 1; }

  .slider-help {
    font-size: 12px;
    color: var(--txt2);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* v3.0.13: help-icon (?) naast slider-labels */
  .help-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 0.5px solid var(--bdr2);
    background: var(--card);
    color: var(--txt2);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 6px;
    padding: 0;
    line-height: 1;
    transition: all 0.15s ease;
    vertical-align: 1px;
  }
  .help-icon:hover {
    background: var(--txt1);
    color: #fff;
    border-color: var(--txt1);
  }
  .help-icon:focus-visible {
    outline: 2px solid var(--txt1);
    outline-offset: 2px;
  }

  /* v3.0.13: help-modal */
  .help-modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    z-index: 1000;
    overflow-y: auto;
  }
  .help-modal {
    background: var(--card);
    border-radius: var(--r12);
    padding: 24px 28px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    position: relative;
  }
  .help-modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    font-size: 24px;
    line-height: 1;
    color: var(--txt2);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--r6);
  }
  .help-modal-close:hover {
    background: var(--surf);
    color: var(--txt1);
  }
  .help-modal-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0 30px 12px 0;
    color: var(--txt1);
    line-height: 1.3;
  }
  .help-modal-current {
    font-size: 13px;
    color: var(--txt2);
    background: var(--surf);
    padding: 8px 12px;
    border-radius: var(--r6);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .help-modal-section-h {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
    margin: 14px 0 6px;
  }
  .help-modal-section-h:first-of-type { margin-top: 0; }
  .help-modal-section-body {
    font-size: 13px;
    color: var(--txt1);
    line-height: 1.55;
    margin: 0;
  }
  /* v3.0.38: parameter-tabel in fonds-?-modal */
  .help-modal-params {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 4px;
    font-size: 12.5px;
  }
  .help-modal-params thead th {
    text-align: left;
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
    border-bottom: 1px solid var(--bdr);
    padding: 6px 8px 6px 0;
  }
  .help-modal-params tbody td {
    padding: 6px 8px 6px 0;
    border-bottom: 0.5px solid var(--bdr);
    color: var(--txt1);
    vertical-align: top;
  }
  .help-modal-params tbody tr:last-child td { border-bottom: none; }
  .help-modal-params td.num {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    font-weight: 500;
  }
  .help-modal-params .adj-yes {
    color: var(--green);
    font-weight: 500;
  }
  .help-modal-params .adj-no {
    color: var(--txt2);
  }
  @media (max-width: 640px) {
    .help-modal {
      padding: 18px 20px;
    }
  }

  /* ─── KPI-cards ─────────────────────────────────────────────── */
  .output { margin-top: 14px; }
  .kpi-card {
    background: var(--surf);
    border-radius: var(--r12);
    padding: 14px 18px;
    text-align: left;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .kpi-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--red);
    line-height: 1.1;
    margin: 4px 0;
  }
  .kpi-m2 .kpi-value { color: var(--green); }
  .kpi-delta {
    font-size: 13px;
    font-weight: 600;
    margin: 2px 0 0;
    color: var(--txt2);
  }
  .kpi-delta.pos { color: var(--green); }
  .kpi-delta.neg { color: var(--red); }
  .kpi-breakdown {
    font-size: 12px;
    color: var(--txt2);
    margin-top: 12px;
    padding-top: 10px;
    border-top: 0.5px solid var(--bdr);
    display: flex;
    gap: 28px;
  }
  .kpi-sub-label {
    font-size: 10px;
    color: var(--txt2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .kpi-sub-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--txt1);
    margin-top: 2px;
  }
  .kpi-foot {
    font-size: 11px;
    color: var(--txt2);
    margin-top: 10px;
    padding-top: 8px;
    border-top: 0.5px solid var(--bdr);
  }

  /* M2-controls block (sliders + radios) */
  .m2-controls {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 0.5px solid var(--bdr);
  }

  /* ─── Audit-pane content ────────────────────────────────────── */
  .meta-note {
    font-size: 11px;
    color: var(--txt2);
    margin-top: 12px;
    padding-top: 8px;
    border-top: 0.5px dashed var(--bdr);
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 6px;
    font-size: 12px;
  }
  th, td {
    border-bottom: 0.5px solid var(--bdr);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--surf);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--txt2);
  }
  td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', Consolas, monospace;
  }
  tr.display-decompositie td { background: rgba(0,0,0,0.01); }
  tr.display-deepdive td { background: rgba(0,0,0,0.025); color: var(--txt2); }
  tr.display-diagnose td { background: rgba(212,0,26,0.04); color: #884444; }
  tr.cohort-totals td {
    font-weight: 600;
    background: var(--surf);
    border-top: 1px solid var(--bdr2);
  }
  .cohort-table { font-size: 11px; }
  .modtag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    margin-right: 5px;
    border-radius: 6px;
    font-family: monospace;
    vertical-align: middle;
  }
  .modtag-shared { background: var(--surf); color: var(--txt2); }
  .modtag-m1 { background: rgba(212,0,26,0.10); color: var(--red); }
  .modtag-m2 { background: rgba(26,138,69,0.12); color: var(--green); }
  .specref {
    font-family: monospace;
    font-size: 11px;
    color: var(--txt2);
  }
  code {
    font-family: monospace;
    background: var(--surf);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }
  .info {
    cursor: help;
    color: var(--amber);
    font-size: 12px;
    margin-left: 4px;
  }
  .disclosure-list {
    font-size: 12px;
    padding-left: 16px;
    line-height: 1.55;
  }
  .disclosure-list li { margin-bottom: 4px; }
  .error {
    background: rgba(212,0,26,0.06);
    color: var(--red);
    padding: 10px 12px;
    border-radius: var(--r6);
    font-size: 13px;
  }

  /* ─── Topline (h1 + ?-knop) ──────────────────────────────────── */
  .topline {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding: 0 4px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .topline h1 {
    margin-bottom: 0;
    flex: 1;
  }
  .topline-help-btn {
    flex-shrink: 0;
  }
  /* v3.0.22: Uitleg-tekstknop in topline */
  .topline-text-btn {
    flex-shrink: 0;
    padding: 4px 12px;
    border: 0.5px solid var(--bdr2);
    background: var(--card);
    color: var(--txt1);
    border-radius: var(--r6);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    user-select: none;
  }
  .topline-text-btn:hover {
    background: var(--surf);
    border-color: var(--txt1);
  }

  /* ─── Audit-unlock + footer ─────────────────────────────────── */
  .audit-unlock {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 0.5px dashed var(--bdr);
    font-size: 12px;
    color: var(--txt2);
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .audit-unlock summary {
    cursor: pointer;
    user-select: none;
    color: var(--txt2);
  }
  .audit-unlock summary:hover { color: var(--txt1); }
  .audit-unlock-form {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .audit-unlock-form input {
    padding: 6px 10px;
    border: 1px solid var(--bdr2);
    border-radius: var(--r6);
    font-size: 13px;
    flex: 1;
    min-width: 160px;
    font-family: inherit;
  }
  .audit-unlock-form button {
    padding: 6px 14px;
    background: var(--txt1);
    color: #fff;
    border: none;
    border-radius: var(--r6);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
  }
  .audit-unlock-form button:hover { background: #000; }

  .site-footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 0.5px solid var(--bdr);
    font-size: 12px;
    color: var(--txt2);
    text-align: center;
    line-height: 1.6;
  }
  .site-footer p { margin: 3px 0; font-size: 12px; color: var(--txt2); }
  .site-footer .footer-disclaimer { color: var(--txt1); }
  .site-footer .footer-meta { color: var(--txt2); font-size: 11px; }

  /* ─── KPI-flash (subtiele animatie bij Enter-bevestig) ──────── */
  .kpi-card { transition: background 0.3s ease; }
  .kpi-card.flash { animation: kpi-flash 0.45s ease-out; }
  @keyframes kpi-flash {
    0%   { background: var(--surf); }
    25%  { background: rgba(212,0,26,0.10); }
    100% { background: var(--surf); }
  }
  .kpi-m2.flash { animation: kpi-flash-m2 0.45s ease-out; }
  @keyframes kpi-flash-m2 {
    0%   { background: var(--surf); }
    25%  { background: rgba(26,138,69,0.12); }
    100% { background: var(--surf); }
  }

  /* ─── Mobile ────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    body { padding: 16px 12px 40px; }
    body > .topline h1,
    body > h1 { font-size: 16px; }
    .pane { padding: 14px 16px; }
    .field {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .field input[type="number"],
    .field input[type="text"],
    .field select { max-width: 100%; }
    .kpi-value { font-size: 26px; }
    .kpi-breakdown { gap: 16px; }
  }

  /* ─── v3.0.41: Print-knop en print-rapport ───────────────────── */
  /* Knop in de actie-pane onder de M2-output. Bewust subtiel: een
     secundaire actie, niet de hoofd-CTA. */
  .pane.casual.pane-actions {
    border-left: 3px solid var(--txt2);
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
  }
  .pane-actions .action-btn {
    background: var(--surf);
    color: var(--txt1);
    border: 1px solid var(--bdr);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .pane-actions .action-btn:hover {
    background: var(--bdr);
    border-color: var(--txt2);
  }
  .pane-actions .action-btn:focus-visible {
    outline: 2px solid var(--txt1);
    outline-offset: 2px;
  }
  .pane-actions .action-note {
    font-size: 12px;
    color: var(--txt2);
    line-height: 1.45;
    margin: 0;
  }

  /* Verberg het print-rapport in normale weergave; alleen tonen bij print. */
  #print-report { display: none; }

  /* ─── @media print: alleen het rapport tonen ─────────────────── */
  @media print {
    /* Verberg ALLE app-UI tijdens printen. */
    body > *:not(#print-report) { display: none !important; }
    #print-report {
      display: block !important;
